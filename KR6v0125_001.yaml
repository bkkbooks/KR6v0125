body:
  text: 觀音齋儀文序觀音齋者眉州著作佐郎侯君元叔之集也元叔於豫為故人謄書見及求為之序豫謹按楞嚴經云自未得度先度人者菩薩發心自覺已圓能覺他者如來應世莫不隨緣赴感悉示妙嚴接物利生曲垂悲憫燃光明燈破一切冥途駕大慈航度無邊苦海常樂我淨舉足皆是生老病死無塵不入舉皈依無量壽尊佛大佛頂首楞嚴經入綱惟我補陀大士天竺威神闢方便門發如是願種種解脫何止八萬四千法門利益之多念念歸依勝奉六十二億菩薩之衆何異乎鴻鐘在𥵂叩之者隨大小之鳴巨鑑當軒臨之者亡妍媸之遁疾乎空谷之響應煥然皎月之影隨見聞覺知備載諸教因緣會遇豈虛示人入綱於戲如夜捫枕得通身手眼之機若雞抱子有啐啄同時之喻精神所至不昧圓通正念既專靡差毫髮齋儀之設其可忽諸歸依觀世音菩薩大佛頂首楞嚴經入綱時元豐改元戊午九月日推誠保德切臣資政殿大學士正奉大夫右諫議大夫前知成都軍府事兼管內橋道勸農叟兼州路屯駐洎本誠兵馬鈴轄上柱國南陽郡開國侯食邑一千戶食實封二百戶賜紫金魚帶趙林謹序眉州著作佐郎成都府教授賢良侯溥集此齋各隨家業厚薄以備供獻不須枉費只要志誠嚴潔為本請七僧或五僧三僧任意一僧充啓請法師一僧充加持法師先掃潔庭宇或就寺院安排觀音法席或雕刻塑粧觀音一尊便可開建道場若能盡畫或塑諸觀音變相者即端莊嚴其法席前備十九分或八分香花燈果齋食乳酪酥蜜茶水以充供養經雖言乳酪酥蜜若不能盡備即亦無害唯齋食一件候第三時啓請了方下供養所以用十九分者按普門品化身十九相之義如只具八分亦可者蓋取十九身束為八類之義此外別安排十分齋食并茶香燈花果任意別作一位附近法席候第三時啓請了用供獻天曹地府水府十方諸鬼神候道場散了取觀音面前齋食三分投之江河如去水太遠即棄之荒野及以些小投屋瓦上以飼飛禽所餘齋食不得令當日喫葷血人食之此齋所誦真言等一一是大藏教中觀音自説或佛為觀音所説凡人聞居念誦俱延福壽舉歸依大勢至菩薩大佛頂首楞嚴經先一日齋須潔浴不茹葷血請加持僧持咒咒柴二十一枝候作齋食時令於鉎釜下衮柴燒之持咒咒油以備燃燈又持大悲心二十一遍咒安息香又持咒咒井花水一瓶以備淨水候僧俗入道場即加持僧傾水於淨器中以柳枝灑道場四畔如立界至以去觸穢又各以一二滴灑僧俗衣上方得入道場其不經淨水所灑之人不得入道場內只得遙遠瞻禮舉南無無垢淨光佛觀音勝會啓壇場密咒柴油水米香安息飛煙雲霧捲蘭膏發熖慧燈光緇流濟濟皆精潔賢聖巍巍盡讚揚法雨滿空甘露灑道場無處不清涼加持咒誦柴油水米花香燈供真言觀音感驗難思議能與衆生作福緣柴油淨水誦真言所冀吉蠲無觸穢南無佛陀耶南無達麼耶南無僧伽耶南無阿利耶跋路吉羝攝婆羅耶菩提薩埵耶摩訶薩埵耶摩訶伽樓尼伽耶多絰他呵私陀私呼樓呼樓周樓蘇樓蘇樓娑婆訶大明神咒經觀音咒油真言壓油縱有傷生悮破暗寧無利物心更憑祕密作加持爍破群昏無限量南無佛陀耶南無達摩耶南無僧伽耶南無阿利耶跋路吉羝攝婆羅耶菩提薩埵耶摩訶薩埵耶摩訶伽樓尼伽耶多絰他私利私利地利地利私利地利婆婆訶觀音咒淨水真言妙湛靈源常混混真空性水自淵淵衆生無始妄情昏普願霑濡心垢淨唵㫊暮伽惹攞跛囉塞囉縛臡吽尊勝咒燒香供養香真言佛世比丘燒沉水香嚴聞已悟圓通檀那敬請聖觀音拙具羅香憑此咒唵健馱塞叵羅抳縒漫嚲米伽跛囉塞普囉𤙖唵塞普鮮健悌塞普囉𤙖觀音咒米真言心地清涼由法力色身安快仗資糧我今稱讚此密言菩薩天人常賜我唵阿謨伽囉闍鉢囉底車囉伽摩地闍訖柳噓拏訖柳噓拏麼林莎訶止諸部因緣梵語心經聞經衆等罪消滅
