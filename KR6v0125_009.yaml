body:
  text: 圓通三慧道場密教下觀音禮拜真言稱揚聖德將身禮禮拜能除我慢愆五輪投地誓歸依又更宣揚禮拜咒唵阿慕伽嚩底吽召請真言感應雖為不請友我今請召表虔心崇茲勝會結良緣早願速成無上道唵縒曼多步嚩尼慕伽迦利娑拏吽勸請真言無始劫來生我慢於諸聖衆不恭欽回心注想聖觀音身業皈依希攝受唵薩嚩嚲詫誐多菩提薩埵跋履述陀塞嚩皤婆埵麼述悌三布羅耶吽止加持獻食真言法身豈假四種食我今奉獻表誠心願此一食遍微塵資養菩提常樂果南無羅怛那怛羅夜野那謨阿利野婆路枳底濕嚩羅耶菩提薩埵耶摩訶莎埵耶摩訶迦盧尼伽耶莎嚩莎埵呬嶝迦羅耶暮伽嚩羅波羅那野薩嚩薩埵曼那播曩波羅那野你摩那誐那誐那諭懪爾耶弭弭陀羅散那跋羅那野娑迦羅步嚩禰步嚩那彌輸陀你散怛播野跛羅弭秫悌娑嚩訶止四大聖人施鬼神食真言肅陳香供祈真聖已蒙降格鑒丹衷今當薦獻諸鬼神願發歡心垂納受唵跋羅步多弭麼梨參播嚩吽施甘露咒跢姪他阿利多利都多利都梨醢蘭拏夜揭羅鞞曷羅叉曷羅叉三摩闍娑婆突薩蚾溪弊治菩薩跛達羅達羅鞞弊治莎賀三時升座加持字母重登寶座會集人天字母真言作法供養三身四智俱平等五教三乘悉混融方袍圓頂火中蓮列派分流無已矣南無囉怛那多羅夜耶南無娑唎嚩沒馱冒地娑怛嚩喃稽首梵音三歌讚稽首歸依觀音菩薩祥雲影裏初生紫金光相身掛六銖衣兩朵紅蓮襯足眉彎似雙月相分摩耶體垂珠瓔珞七寶藏莊嚴化身千百億尋聲救苦示現多門淨瓶楊柳一灑遍乾坤六道三途盡息慈悲一等均平功無盡衆生讚詠懺悔出迷津南無大佛頂首楞嚴經圓通海會佛菩薩入聖超凡事不難一條大路透長安觀音修證無他術自己安存總一般進步天魔心膽戰轉身權小骨毛寒從來龜鑑分明在拈出教君仔細看比丘某稽首和南敬白清淨大衆今此觀音道場第三時中敘述修道證真法門顯揚三世諸佛六道出離成佛事業伏望大衆各宜攝耳善思念之速須悟理修心莫只隨波逐浪此時一失再會何期解脫修心會中靜聽加持燈供養真言作法念誦三時啓召方周備祕密伽陀盡舉揚上憑淨聖本慈心願我音聲充法界唵慕伽摩尼入嚩羅入嚩羅吽香供養真言唵塞普鮮健悌塞普羅吽花供養真言唵暮伽補澀波跛羅嚩隸吽果供養真言唵暮伽縒羅三布羅尼羅縒羅縒起羅嚩底吽酥乳蜜供養真言唵素嚕素嚕禁皤襪底莎嚩賀三時供養真言唵室𭌆弭訖羅麼阿慕伽散𠆙播𭔞吽不空灌頂真言唵阿暮伽曼拏羅鉢頭摩鼻曬迦麼尼跋馹隸薩嚩嚲詫誐多鼻曬雞吽不空摩尼供養真言唵暮伽布惹麼尼鉢頭麼跋馹隸嚲詑誐多弭盧枳諦縒曼多跋羅縒羅吽止接提綱吟偈入經種族奮怒王真言觀音初行菩薩道廣發因中大願王今時禮誦仰慈悲更仗密言加讚嘆唵摩訶戰拏鉢頭迷濕嚩囉弭弭馱嚕播彌迦鮮鉢頭麼鄧琴吒羅迦羅羅鼻晒拏嚩訖怛羅薩嚩納瑟吒訖利娜焰佉那野弭訖喃鉢頭摩姪力旨置姪力置𤙖娑婆訶種族忿怒王心真言唵暮伽鉢頭摩瑟尼灑摩訶鉢頭摩播捨矩嚕陀迦哩灑野鉢羅廢捨野麼訶鉢戍鉢底野麼婆魯拏矩廢羅沒羅㰤摩廢灑馱羅摩訶戰拏米誐暮伽矩羅縒麼野鉢頭迷吽吽觀音普遍解脫心真言唵沒羅㰤麼廢灑陀羅廢灑陀羅地利地利度嚕度嚕縒曼嚲入嚩羅畝佉𤙖薩賀普遍解脫心一字真言唵惡娑婆訶布施波羅密真言唵那謨薩嚩怛詑誐多喃那謨阿利也嚩路枳帝濕嚩羅野菩提薩埵耶摩訶薩埵耶摩訶迦盧尼迦耶唵阿慕伽摩訶娜娜鉢羅密多播哩布羅野𤙖那羅弭弭馱弭質怛㘈薩嚩薩怛舞播抱誐莎嚩嚲詑誐跢麼訶娜娜布惹米偈跛羅襪嚲野嚲囉嚲野嚲囉邪麼訶鉢頭麼播抳𤙖怖莎婆訶淨戒波羅密真言那謨薩嚩嚲詑誐跢喃那謨阿利耶嚩路枳諦濕嚩羅野菩提薩埵耶摩訶薩埵耶摩訶迦盧尼迦耶唵阿慕伽始羅三皤羅三皤羅皤羅皤羅秫陀薩埵嚩鉢頭麼弭步使嚲步惹馱羅馱羅三滿多婆路枳跢𤙖怖莎婆訶止歌讚般若智明菩提心發修大道正可攀緣理從頓悟真妄攝歸全十二見縛解脫便可樂法門功玄陀羅尼堂堂妙相現出萬人前修心無雜想諸天龍女攝化莊嚴是無染著如理事俱圓救度衆生離苦入正覺雪誤尤愆諸大衆世出世現道果滿三千接提綱入經加持安忍波羅密真言遠歷僧祗修六度憑茲運載出迷津聖人悲願度衆生方便門中宣密語那謨薩嚩嚲詑誐多喃那謨阿利耶嚩嚕枳諦濕嚩羅野菩提薩埵耶摩訶莎埵耶摩訶迦嚕尼迦耶唵暮伽乞訕底莎嚩菩提莎埵嚩乞灑摩尼乞灑拏乞灑拏摩訶梅室唎迦盧拏莎埵襪婆囉摩訶迦盧尼迦莎嚩薩埵嚩乞灑弭拏𤙖怖娑嚩訶精進波羅密多咒那謨薩嚩嚲詑誐跢喃南無阿利耶嚩路枳諦濕嚩羅耶菩提莎埵野摩訶莎埵耶摩訶迦盧尼迦野唵摩訶弭利耶阿慕伽弭路枳嚲者羅者羅寧哩荼弭哩野摩訶嚩羅嚩羅嚩羅摩訶莎杖誐嚩囉菩馱你𤙖怖娑婆訶止歌讚萬行圓融三輪清淨當修六度功勛布施無畏戒律每精勤耐忍耐怨絶妄除煩惱捨妄歸真修淨行超凡入聖道果自圓明被甲專精進闃寂禪定解脫修心勉求智慧何處馳騁勞尋無盡法門廣攝石岩畔鳥啼猴鳴圓種智堂堂妙相萬古與長存提綱入經靜慮波羅蜜真言地位法門開六度功成果證大菩提漸修頓悟等無差堪仗真言為外護那謨薩嚩嚲詑誐跢喃那謨阿唎耶嚩盧枳諦濕嚩羅野菩提薩埵耶摩訶莎埵耶摩訶迦盧尼迦耶唵莎嚩嚲詑誐跢南摩訶慕伽迦盧拏杖㰤娜娑摩地弭目乞灑跛羅劒𬼩主盧主盧𤙖怖娑婆訶般若波羅蜜真言那謨薩嚩嚲詑誐跢喃那謨阿利野嚩路枳諦濕嚩羅野菩提薩埵耶摩訶莎埵耶摩訶迦