body:
  text: 圓通三慧道場儀文上眉州著作佐郎侯溥賢良集升座舉加持楞嚴字母陀羅尼初登寶座會集人天字母伽陀加持念誦稽首光明大佛頂如來萬行首楞嚴光中化佛演微言誦念溥令祛宿業歌讚稽首歸依補陀山上大聖名號觀音常扶八難感應濟群情毫相分輝百億楊枝灑苦海為霖塵沙界勞生敬仰一念免漂沉巍巍蓮座上花縵瓔珞體瑩如金項珮珠絲網百寶嚴身處處尋聲救苦頭頭露接物垂形真慈父爐煙繚繞遙望鑑誠心舉南無大佛頂首楞嚴經圓通海會佛菩薩吟偈滿目旃檀紫竹林頭頭顯露聖觀音初時已證圓通會先發菩提四善心道場敘勸發四善心儀當演大佛頂首楞嚴經三慧門高絶品題而今識與辨端猊含靈識本從頭悟淨聖垂慈為獎提超果超因離勝迹假名假相示筌第福田壽域無涯際携手相從闊步躋比丘某敬白清淨大衆今此觀音三慧道場第一時中初登寶座宣演法門各宜屏絶外緣靜聽法要無得懈怠笑語喧譁自取愆尤悔何所及預告衆等宜戒之哉各發無上志誠心大佛頂首楞嚴經各發無上菩提心敘發四善心儀當演大佛頂首楞嚴經提綱觀音道場敘勸發四善心者第一發正信心為道場開啓第二發恭謹心為道場奉事第三發慈悲心為道場作用第四發勇猛心為道場成就入密舉各發無上正信心正信心者按經云妙音觀世音梵音海潮音勝彼世間音是故須常念念念無生疑苟或一念生疑便入邪見故此作大齊以正信心為道場開啓各發無上恭謹心恭謹心者凡設此齊切須虔潔心謹於內貌恭於外所冀聖賢降格儻不如是雖復日夜百拜無異孩童跳躍非獨不能降格聖賢適足以取侮慢聖賢之罪天龍八部不賜護持本欲消災反成取罪故以恭謹心為道場奉事各發無上慈悲心慈悲心者今日此齊雖自施主至於廣大願力當令普及一切按普門品無盡意菩薩即解頸衆寶珠瓔珞價值百千兩金以備供養而觀世音菩薩不肯受之無盡意言仁者愍我等故受此瓔珞爾時佛告觀世音菩薩言當愍此無盡意及四衆天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人非人等故受是瓔珞且瓔珞是無盡意所解以備供養不肯自言愍我而言愍我等故佛亦不獨言愍無盡意而言當愍此無盡意及四衆比丘比丘尼優婆塞優婆夷以至天龍鬼神人非人等以此言之發菩提心貴於廣大若不廣大即是有人我分別然則今施主此齊願力亦為廣大初以集福延壽次以拔苦懺罪終以修道證真自合門尊幼無有良賤咸得集福咸得延壽咸得拔苦懺罪咸得修道證真其次願我此齊願力遍法界中一切人道咸得集福咸得延壽一切鬼神地獄餓鬼畜生咸得拔苦懺罪一切含生咸得修道證真此則是慈能與樂悲能拔苦之心故以慈悲心為道場作用若薦亡即云今施主此齊專以薦嚴某人之神識所冀拔苦懺罪自無始時來所作罪業盡皆懺洗乃至修道證真其有先亡遠祖內外宗親一切眷屬同霑利樂其次願我此齊願力遍滿法界一切幽魂咸蒙追薦咸生人天一切鬼神地獄餓鬼畜生咸得拔苦懺罪一切含靈咸得修道證真此則是慈悲能與樂悲能拔苦之心故以慈悲心為道場作用各發無上勇猛心勇猛心者今修此齊豈徒盛陳香燈嚴備蔬果而已實欲因菩薩大願救我迷妄於此時中便須省覺發徑勇心修大乘行懺洗宿愆永不復作從今日去身心清淨直至成佛故以勇猛心為道場成就合道場人既已發四種善心即當諦聽止四善心惟正性強慈悲恭謹是壇場但能念念無生滅自證空空絶忖量佛法地平堪履玩是非門險莫談揚更能猛勱除人我覺悟修行見法王勸發四善經文法師諷演止總持王菩薩加持儀文請為宣揚對案加持文如來以大慈悲利物菩薩以大方便度人或祗陀林間或菩提樹下或補陀山上或兜率宮中在在處處特演於密言物物塵塵盡期於普濟皆三世諸佛之所印可是一切衆生之所皈依西方號為陀羅尼中國譯為總持字莫非真語實語悉出大乘上乘以之祈福壽則祿厚算長以之祛邪魔則膽破腦裂以之救六道則即時離苦以之修一心則衆聖現前粵惟此夕香壇專奉觀音大士總括神咒集為新儀今欲正入案加持再勞清衆運起潮音先舉五聲聖號輒吟八句偈章偈聲甫畢加持供養人天虔潔共歸依召請方嚴第一時上聖赴緣臨垢濁衆生翹首仰慈悲飄颻瓔珞清音間芬馥旃檀瑞氣隨欲仗密言成勝事輒堅精意為加持應感真言酥乳蜜真言敘觀音修證本末儀當演大佛頂首楞嚴經恭以觀音大士修證凡有三說一者按悲華經云轉輪聖王第一太子答梵志言我今觀於地獄衆生多諸苦惱人天之中或有垢心以垢心故數數墮於三惡道中復作是念是諸衆生以坐親近惡知識故退失正法墮大暗處盡諸善根攝取種種諸邪見等以覆其心行於邪道世尊我今以大音聲告諸衆生我今所有一切善根盡回向阿耨多羅三藐三菩提願我行菩薩道時若有衆生受諸苦惱恐怖等事退失正法墮大暗處憂愁孤窮無有救護無依無舍若能念我稱我名字若其為我天耳所聞天眼所見是諸衆生等若不得免斯苦惱者我終不成阿耨多羅三藐三菩提唯願世尊為我授記爾時寶藏佛尋為授記善男子汝觀天人及三惡道一切衆生生大悲心欲斷衆生諸苦惱故欲令衆生住安樂故善男子今當字汝為觀世音善男子無量壽佛般涅槃後第二恆河沙等阿僧祗劫初夜分中汝於後夜種種莊嚴菩提樹下坐金剛座於一念中間成阿耨多羅三藐三菩提號遍出一切光明功德山王如來又按大悲分陀利經三王子授記品所言與悲華經大抵無異彼經云爾時海濟婆羅門告無量淨王第一太子不眴目此則不眴目是觀音為太子時名也無量淨王即阿彌陀如來為轉輪王時名也彼經又言觀音成佛名光明普至尊積德王如來與此經所謂遍出一切光明功德山王如來大意亦同但譯經之人保據梵本所見各別不在置疑又按觀音授記經云金光獅子遊戲如來法中有王名曰威德王彼王於其園觀入於三昧其王左右有二蓮花從地涌出雜花莊嚴有二童子化生其中與威德王俱詣佛所時二童子以偈問佛云何為供養無上兩足尊願說其義趣聞者當奉行香花衆伎樂衣服藥臥具如是等供養云何為最勝爾時彼佛即為童子而說偈曰當發菩提心廣濟諸群品是則供正覺三十二相明設滿恆沙剎珍妙莊嚴具奉獻諸如來及歡喜頂戴不如以慈心回向於菩提是福為最勝無量無有邊餘供無過者超踰不可計如是菩提心必成等正覺時二童子復說偈言諸天龍鬼神聽我師子吼今於如來前弘誓發菩提生死無量劫本際不可知為一衆生故爾數劫行道況此諸劫中度脫無量衆修行菩提道而生疲倦心我欲從今始起於貪欲心是則為欺誑十方一切佛瞋恚愚癡垢慳嫉亦復然我今說實語遠離於虛妄我若於今始起於聲聞心不樂修菩提是則歎世尊亦不求緣覺自濟利己身當於萬億劫大悲度衆生如今日佛土清淨妙莊嚴令我得道時超踰億百千國無聲聞衆亦無緣覺乘淳有諸菩薩其數無限量衆生淨無垢悉具上妙藥出生於正覺總持諸法藏此誓若誠實當動大千界說如是偈已應時普震動百千衆伎樂演法和雅音光曜微妙眼旋轉而來降諸天於空中雨散衆末香其香普流熏悅可衆生心佛告華德藏爾時威德王者豈異人乎我身是也時二童子者今觀世音及大勢至菩薩摩訶薩是也阿彌陀佛正法滅後過中夜分明相出時觀世音於七寶菩提樹下結跏趺座成等正覺號普光功德山王如來此則普光之名又少異於三王子授記之文亦是譯經之人見各別耳二者觀音大士是古佛化現作菩薩形以度衆生按不思議境界經云佛成正覺有十佛剎微塵數等他方諸佛為欲莊嚴毗盧遮那道場故示菩薩形來在會坐其名曰觀自在菩薩又按大悲心經云佛告阿難此觀自在菩薩有不可思議威神之力已於過去無量無數阿僧祗劫前已成佛竟號曰正法明王如來大悲願力為欲成熟安樂一切衆生故現作菩薩三者按楞嚴經云觀世音菩薩言我昔無數恆河沙劫於時有佛出現於世名觀世音我於彼佛發菩提心彼佛教我從聞思修入三摩地初於聞中入流亡所所入既寂動靜二相了然不生如是漸增聞所聞盡盡聞不住覺所覺空空覺極圓空所空滅生滅既滅寂滅現前忽然超越世出世間十方圓明獲二殊勝一者上合十方諸佛本妙覺心與諸佛如來同一慈力二者下合十方一切六道衆生與諸衆生同一悲仰世尊由我供養觀音如來蒙彼如來授我如幻聞熏聞修金剛三昧與佛如來同慈力故令我身成三十二應入諸國土世尊彼佛如來歎我善得圓通法門於大會中授記我為觀世音號由我觀聽十方圓明故觀音名遍十方界觀音修證出悲華觀見衆生行業差無量淨王元古佛不眴太子選其家師資身現三王子左右蓮開二朵花以大音聲勸回向菩提心發遍河沙修證本末經文法師諷演止不空羂索真言敘釋名攝化儀當演大佛頂首楞嚴經據觀音菩薩亦號觀自在菩薩蓋梵言婆盧枳底此謂之觀梵言攝伐多此謂之音梵言濕伐囉此謂之自在菩薩者梵言菩提薩埵此略而言謂之菩薩梵言菩提此謂之覺亦謂之導梵言薩埵此謂之有情按佛地論總有三釋一云菩提是所求果薩埵是能求人人求於果是菩提之薩埵也二者菩提是智是所求果薩埵是悲是所度雙取求度以立己名謂之菩薩三者菩提是所求果薩埵是勇猛精進以大精進求於菩提今觀世音一名觀自在菩薩者若是三業攝化即云觀自在若專以語業攝化即云觀世音蓋衆生以語業歸依則觀其音聲為之濟拔故曰觀世音若以三業歸依則六通赴感攝利難思故曰觀自在瞿波論師云明而遠以身業禮表大士有天眼通暗而遠以意業禮表大士有他心通暗而近以語業禮表大士有天耳通按普門品云佛告無盡意若有無量百千萬億衆生受諸苦惱聞是觀世音菩薩一心稱名觀世音菩薩即時觀其音聲皆得解脫此是以語業攝化也由稱名故能除七災一曰火不能燒二曰大水所漂即得淺處三曰黑風吹其船舫飄墮羅剎鬼國皆得解脫羅剎之難四曰臨當被害彼所執刀杖尋段段壞而得解脫五曰夜叉羅剎欲來惱人是諸惡鬼尚不能以惡眼視之況復加害六曰若有罪若無罪杻械枷鎖檢繫其身皆悉斷壞即得解脫七曰三千大千國土滿中怨賊有一商主將諸商人齎持重寶經過險路即得解脫此七者皆由稱觀世音菩薩名號故獲免難此是語業攝化也身業攝化者發露志誠盡虔懇者莫先於禮拜故曰若有衆生恭敬禮拜觀世音菩薩福不唐捐由禮拜故能滿一切願故曰若有女人設欲求男禮拜供養觀世音菩薩便生福德智慧之男設欲求女便生端正有相之女此二者皆由禮拜觀世音菩薩慈容故獲如意此是身業攝化也意業攝化者造罪造福皆由一念苟能冥心存念觀世音菩薩或念菩薩行願或念菩薩聖容或念菩薩經文神咒自然自心清淨不為邪見魔鬼蔽覆其心是故衆生常應心念由心念故能淨三毒故曰若有衆生多於淫欲常念恭敬觀世音菩薩便得離欲乃至若多愚癡常念恭敬觀世音菩薩便得離癡若多瞋恚常念恭敬觀世音菩薩便得離瞋此三者皆由存念觀世音菩薩故獲清淨合道場人各當志誠以口業稱讚以身業拜跪以意業存念庶使願心圓滿勝事周諧佛不欺人必增福壽必遂薦拔釋名攝化理幽深梵語華言仔細尋濕伐羅耶稱自在婆盧枳底即觀音生生善解無窮難劫劫能除有漏心三業歸依頭面禮聞聲救苦便垂臨釋名攝化經文持經諷誦止隨心咒至第四咒敘存念觀音儀當演大佛頂首楞嚴經所謂念觀音者從淺至深凡有三說一者熏習念念觀音之名號二者歸仰念念觀音之慈願三者三昧念念觀音之法門且第一熏習念者據楞嚴經說大勢至菩薩勸人念佛譬如有人一專為憶一人專念如是二人若逢不逢或見非見二人相憶二憶念深從生至生同於形影不相乖異十方如來憐念衆生如母憶子若子逃逝雖憶何為子若憶母如母憶時母子歷生不相違遠若衆生心憶佛念佛現前當來必定見佛去佛不遠不假方便自然心開見佛聞法得親印記如染香人身有香氣以念佛心入無生忍今於此界攝念佛人歸於淨土是知三業穢惡常逐六塵苟非念佛攝心何能熏炙衆善稱念名號或憶相儀拔苦消災其功不淺故觀經云韋提希夫人念釋迦牟尼佛禮拜未起佛已現前故普門品云是故須常念念念勿生疑於苦惱死厄能為作依怙即是一念名字與六十二億恆河沙菩薩名字功德等無有異此名熏習念念觀音之名號第二歸仰念念觀音之慈願者據世親菩薩論說念佛有五門一身業禮拜名之為念二口業稱讚名之為念三意業思惟名之為念四發願歸依名之為念五回向實際名之為念且初身業禮拜名之為念者據離垢菩薩經云佛說修行若非禮拜縱有禪定現前多生業障不可消除對治而言總有八法以招善報八法者何一是供養或財寶隨力或說法利人對治除心中之慳貪感果得現來之財富二者讚歎隨解稱美情發於中對治除口業之妄言感果得無礙之才辨三禮拜五體投地身業欽依對治除我慢之心感果得尊貴之福四懺悔發心懺露不復更為對治除業報煩惱之愆感果得依正具足五勸請欣樂為心普利群品對治除謗法之愆感果得多聞智慧六隨喜忘懷於衆從善如流對治除嫉姤之心感果得大賢眷屬七回向不矜不吝利物洪慈對治除狹劣之心感果得廣大妙果八啓願淨信既發進修不窮對治除退屈之心感果得總持妙行即此八法融歸五門無一孑遺歸依大士以求加被此名歸仰念念觀音之慈願第三三昧念念觀音之法門者梵云三昧此云正受不受諸受得名正受眼不受色耳不受聲鼻不受香舌不受味身不受觸意不攀緣定慧相資寂照無二名為正受明記不失都攝六根名之為念故楞嚴經云初於聞中入流亡所所入既寂動靜二相了然不生如是漸增聞所聞盡盡聞不住覺所覺空空覺極圓空所空滅生滅既滅寂滅現前忽然超越世出世間獲二殊勝一者上合十方諸佛本妙覺心與諸如來同一慈力二者下合十方一切六道衆生與諸衆生同一悲仰故興福慤禪師疏云上合佛心心證無上下合衆生了凡同體上合故不見佛下合故不見衆生平等一如方稱妙覺又上合故不住生死下合故不住涅槃上合故圓慈普應下合故救溺同生悲則謙居覺地仰乃俯類凡夫同凡故敬仰法師垂悲故拔濟群品悲乃傷己苦而拔彼苦仰則荷聖法而虔慈尊是知隨順圓通即是大士超證寂滅同名菩提故觀經云是心是佛豈非自心清淨理智一如契證寂然名之為念故云三昧念念觀音之法門存念觀音各不同五門八法互含融是心是佛如如理無我無人念念空興福疏標慈普應世親論載數何窮稱名歸依修三昧一法通時萬法通存念觀音經文法師諷演止觀音奮怒王真言敘觀音儀相儀當演大佛頂首楞嚴經按觀無量壽佛經云佛告阿難及韋提希見無量壽佛了了分明已次應觀觀世音菩薩此菩薩身長八十萬億那由他由旬身紫金色頂有肉髻項有圓光面各百千由旬其圓光中有五百化佛如釋迦牟尼一一化佛有五百化菩薩無量諸天以為侍者舉身光中五道衆生一切色相皆於中現頂上毗楞伽摩尼寶以為天冠其天冠中有一位化佛高二十五由旬觀世音菩薩面如閻浮檀金色眉間毫相備七寶色流出八萬四千種光明一一光明有無量無數百千化佛一一化佛有無數菩薩以為侍者變現自在滿十方界譬如紅蓮花色有八十億光明以為瓔珞其瓔珞中普現一切諸莊嚴事手掌作五百億雜蓮花色手十指端有八萬四千劃猶如印文一一劃有八萬四千色一一色有八萬四千光其光柔軟普照一切以此寶手接引衆生舉足時足下有千輻輪相自然化成五百億光明臺下足之時有金剛摩尼花布散一切莫不彌滿其餘身相衆好具足如佛無異唯頂上肉髻及無見頂相不及世尊是為觀觀世音菩薩真實色身相名第十觀佛告阿難若欲觀觀世音菩薩當作是觀觀作是觀者不遇諸禍淨除業障除無數劫生死之罪如此菩薩但聞其名獲無量福何況諦觀若有欲觀觀世音菩薩者先觀頂上肉髻次觀天冠其餘衆相亦次第觀之亦令明了如觀掌中作是觀者名為正觀若他觀者名為邪觀又按陀羅尼集經云畫觀世音菩薩像法一切觀世音菩薩像通身白色結跏趺坐百寶莊嚴蓮花座上頭戴七寶莊嚴花冠而有重光其花冠中有位化佛其花冠後作簸箕光其光內總作赤色其像背倚七寶繡枕其像左手屈臂當心又屈中指向上直竪右手屈臂向左手上屈頭指與大指相捻而拄左手中指之上其像頸有寶珠瓔珞左右背腕各有寶釧又以寶花莊白褻絡膊身著花莊白褻之裙其裙腰作青色赤裹又以寶縚繫其腰上此觀音之儀相合道場人各請存念念念不失自然消災滅罪觀音儀相實無邊金色熒煌映紫檀白褻花裝為胳膊毗楞伽寶作天冠頂中化佛無邊億項上分輝有萬般作是觀時為正觀若他觀者被渠謾觀音儀相經文法師諷演止大奮怒王心真言觀音六字拔苦真言歌讚下座普懺罪菩薩摩訶薩四聲比丘某稽首歸命十方三世三寶本師釋迦牟尼佛等上所奉請諸佛聖賢大悲觀世音菩薩憐憫覆護受我奉請顯現道場受我懺悔施主某等為法界沉淪苦趣一切衆生為發菩提心行菩薩道但以三業六根多諸罪纍三障厚重菩提行願不得現前自利利人深自尅責今日奉請諸佛聖賢大悲觀世音菩薩摩訶薩等懺悔過去今生及未來世一切惡業三業六根三障三毒自有身來流浪六道處處受形內無慧眼外近惡人開放逸門造生死業枝條花葉遍滿千二十五有無不受生死輪回無際相續無窮偶得人身犯諸重戒一切諸犯輕重篇聚多有毀犯違逆十方三世諸佛清淨妙戒若不懺悔當墮阿鼻大地獄中畜生餓鬼阿修羅道天上人間受無量苦輪回六道無解脫期今日嚴淨道場誠心懺悔不敢覆藏唯願尊者觀世音菩薩摩訶薩顯現道場放勝光明照燭身心令得淨一切戒根還得如是興隆三寶起護法心起護戒心起四攝心起慈忍心心如金剛願不更犯已犯之罪與法界衆生俱同懺悔盡未來際常得修習菩提行願生生常處淨佛國土三障永除絶三惡道永離衆苦成無上道虛空有盡我願海中懺悔法願已歸命禮三寶普為衆等志心懺悔我等自從無始劫因迷覺海性沉圓無明妄動能所生境風鼓擊波浪起由緣妄見體昏昧外感頑空相現前空分四大互相淩見起六根常融別妄將心境分成二故使一真性相殊由茲生死苦無窮如旋火輪無休息幸逢最後佛垂範因悟從前萬苦辛今投聖衆懺前愆應念化成無上道普為衆等志心發願我昔枉受輪回苦皆由心境妄緣攀而今循省已知非力行斷惑常無倦法門無盡常修學苦海彌天駕法船我今妄習頓能除願我真心常不昧願我直入三摩地願我對境悟圓通願我得果成寶王還度如是恆沙衆普為衆等志心說偈空有多聞迷實相於無漏業不能修當來苦果竟難逃直向聖門求解脫普為衆等志心回向會上因緣三世佛圓通海會佛菩薩聲聞羅漢賢聖僧摩訶般若般羅密回向止
