body:
  text: 圓通三慧道場提綱舉人天同聽梵音聲梵音聲菩薩摩訶薩各四聲世尊演教特叮嚀指示人天眼豁明今日猊頭伸教誡先當舉唱梵音聲竊以詞句輕清初傳於鷲嶺梵音雅唱得自於漁山阿難陀首唱於竺乾陳思王終和於華夏古今同咏凡聖交參斯可以接物導迷斯可以契凡達聖爰將法句演唱梵音面位仁師云何請舉云何於此經究竟到彼岸願佛開微密廣為衆生說上來作梵功德會集人天先伸回奉廣大真如實際莊嚴無上佛果菩提圓通會上剎塵聖賢恩霑釋梵四王利及天龍八部普念摩訶般若波羅密梵音初震一聲雷無限人天眼豁開怪得香風拂庭戶龍天圍繞世尊來南無大佛頂如來密因修證了義諸菩薩萬行首楞嚴經圓通海會佛菩薩壇前教誡儀當演和經題稽首難思真法界圓通海會衆聖賢我今教誡利群生望聖慈悲密加護比丘某稽首和南謹白清淨大衆今此觀音三慧大齊初升猊座會集人天恭聞觀音入三摩地上鼓七辨之風雷為衆生入八難坑中揭九天之日月況此精修法供嚴設華壇恪三業以歸依仰六通而昭格心清性淨目前小白花山雲散月高直下大自在我要見侯溥賢良之軌範當明聖觀自在之行門警策衆心各希洗耳法師宣揚會中諦聽儀至無塵不入歸依無量壽尊佛大佛頂首楞嚴經道場儀序當宣演補陀大士開方便門而度生侯溥賢良按楞嚴經而利物種種解脫念念歸依一段因緣請師饒舌儀至其可忽諸歸依觀世音菩薩大佛頂首楞嚴經道場供養儀當演此觀音齊嚴潔為本香燈花果皆如法乳酪酥蜜任隨機供養聖凡俱延福壽一段因緣請師布露儀至俱延福壽歸依大勢至菩薩大佛頂首楞嚴經道場如法儀當演凡設此齊不茹腥羶加持蜜咒備宣揚僧俗威儀皆整肅儀文演處幽顯霑恩一段因緣請師宣演儀至瞻禮圓通海會佛菩薩道場本末儀宣演儀至之本宗也歸依大佛頂首楞嚴經道場由致儀宣演儀至自然感應宰官說法聖觀音道場修設儀宣演儀至返招過咎常精進菩薩道場警策儀當演儀至當為宣演願證圓通三昧海道場勸誡儀宣演儀至有聞省覺道場咒淨儀宣演儀至歡喜布施舉讚南無無垢淨光佛觀音勝會啓壇場密咒柴油水米香安息飛煙雲霧捲蘭膏發焰慧燈光緇儒濟濟皆精潔賢聖巍巍盡讚揚法雨滿空甘露灑道場何處不清涼咒柴儀文當宣演經題群林樹木屢經霜採入廚中混短長不是丹霞親下手怎教三昧放毫光咒柴儀範師為分張松篁檜柏長青峰自古須憑造化工一帶根莖藏厚土十方枝葉映長空斧斤伐處聲允切爐竈燒時火自紅幸遇丹霞慈愍故也教木佛現神通咒柴真言大明神咒經咒油儀文當宣演經題熒煌續焰事非常取箭輕挑遍十方漸教稱之為乳酪調和甘美噴清香咒油儀範師為宣揚葫麻巨勝長東西氣味相投也大奇全仗壓時無濁穢自然用處兩相宜喚他童子燃燈處勝彼書生鑿壁時夜靜更存方寸現光明照處碧琉璃咒油真言大悲咒咒水儀文當宣演經題岩下寒泉一泒清轆轤抽出器中盈竚看梵韻持鈴咒還似當年湧出瓶咒水儀式請為宣陳泉河滾滾向東流古往今來卒未休岸次雙雙藏宿鷺波心對對泛浮鷗一川大凍宜光武萬里前程問子由江上曉來堪畫處三三兩兩釣魚舟咒水真言尊勝咒咒香儀文當宣演經題拙具羅香誦咒揚便同五分法身香欲知一辮煙生處馥郁盤旋遍十方咒香妙義師為分張本來炙地與熏天自在門中獨占先一炷氤氳充象藏十方貴重表龍涎鼻中嗅著休空過會上拈來信有緣為報合筵諸大衆圓通法會好參禪咒香真言咒米儀文當宣演經題農夫變造已才成揩向金盤若碎星憑仗梵音神咒力盡令顆顆獲圓明咒米儀範師為指陳深耕易耨大奔波春碾冬藏事若何腳力盡時全售用法輪轉處總篩籮養親曾子猶嫌少畫餅雲門絶厭多願與化為禪悅食大家齊唱太平歌咒米真言諸部因緣一時入壇第一時升座舉加持字母陀羅尼初登寶座會集人天字母伽陀加持念誦歌讚稽首歸依補陀山上大聖名號觀音常扶八難感應濟群情毫相分輝百億楊枝灑苦海為霖塵沙界勞生敬仰一念免漂沉巍巍蓮座上花縵瓔珞體瑩如金項珮珠絲網百寶嚴身處處尋聲救苦頭頭露接物垂形真慈父爐煙繚繞遙望鑑誠心南無大佛頂首楞嚴經圓通海會佛菩薩三慧門高絶品題而今識與辨端猊含靈熾本從頭誤淨聖垂慈為獎提超果超因離勝迹假名假相示筌第福田壽域無涯際携手相從闊步躋比丘某敬白清淨大衆今此觀音三慧道場第一時中初登寶座宣演法門各宜屏絶外緣靜聽法要無得懈怠笑語喧譁自取愆尤悔何所及預告衆等宜戒之哉各發無上菩提心發四善心儀當演經題滿目旃檀紫竹林其間菩薩號觀音初時欲示圓通理先發菩提四善心儀文演處師為指陳各發無上正信心聖觀音垂方便勿使衆生入邪見四心惟獨正信強作此大齊為啓建開設法筵人事舉薦各發無上恭謹心聖觀音垂光照接引迷途歸正道如斯感格聖賢臨內外嚴謹心與貌悔慢過愆師當檢校各發無上慈悲心聖觀音分別相寶珠瓔珞千金量佛言愍此受其珍無盡意能成供養作法昭然約文敷暢各發無上勇猛心聖觀音垂慈定人天賢聖咸恭敬假饒四種發殷勤得入玄門無別徑奮勇猛心宜加精進四善心惟正信強慈悲恭謹是壇場但能念念無生滅自證空空絶忖量佛法地平堪履玩是非門險莫談揚更能猛勱除人我覺悟修行見法王四善經文法師宣演總持王菩薩摩訶薩加持儀文法師宣演加持文在密教內吟偈人天虔潔共歸依召請方嚴第一時上聖赴緣臨垢濁衆生翹首仰慈悲飄颻瓔珞清音間芬馥旃檀瑞氣隨欲仗密言成勝事輒堅精意為加持加持感應真言至酥乳蜜咒歌讚正信虔恭慈悲勇猛勿生疑苟殷勤內肅外靜當發志誠心即解寶珠瓔珞價值百千兩金崇奉獻天龍八部四衆盡歸欽菩薩難攝受無盡意懇告觀音愍我等悲故普度有緣人今遇法筵啓建只須好猛厲修心大乘行推開寶藏常轉大法輪修證本末儀當演四心已發道基堅密語伽陀次第宣要識本來觀自在更聽修證大因緣法師宣演大衆默然觀音修證出悲華觀見衆生行業差無量淨王元古佛不眴太子選其家師資身現三王子左右蓮開二朵花以大音聲勸回向菩提心發遍河沙修證經文法師諷演不空羂索真言歌讚稽首圓通慈悲教主昔從海濟婆羅門因緣無量淨王者自習誦華嚴降生皇宮太子不眴目聖相端然修觀行清風皓月處處滿山川修行億萬劫證果成佛默然名光明普功德廣無邊誓度衆生無盡彌陀授記親傳三王子古佛化現神變莫能宣釋名攝化儀當演或名自在或觀音只為差殊理趣深釋梵從華張教網隨機攝化好參尋儀文指示請為敷陳釋名攝化理幽深梵語華言仔細尋濕伐羅耶稱自在婆盧枳底即觀音生生善解無窮難劫劫能除有漏心三業歸依頭面禮聞聲救苦便垂臨攝化經文法師諷演隨心真言至滅罪第四咒歌讚本字觀音釋名攝化號自在正法明王婆魯羯底攝伐羅宣揚無量百千萬億衆生受苦惱鏗鏘稱名號三途六道解脫證真常能除七災水火焚溺多害總潛藏生生善解世世永消亡頓悟大乘上品三業淨六度包含聞聖號菩提薩埵普願往西方存念觀音儀當演是心是佛是觀音切忌迷人向外尋多謝侯公重指示諸人靜聽沒弦琴存念觀音師為指明存念觀音各不同五門八法互含融是心是佛如如理無我無人念念空興福疏標慈普應世親論載數何窮稱名歸仰修三昧一法通時萬法通存念經文法師諷演觀音奮怒王真言歌讚存念觀音歸依大士念念不離真心從深至淺瞻仰聖觀音無盡法門演唱十方剎海推尋無罣礙塵塵剎海剎海與塵塵五門明解悟身口意發願回勳八法善報財法供養感果獲殊因讚嘆辨才無礙頭面禮懺悔殷勤今回向進修妙行即此悟無生觀音儀相當宣演雖然無相叵難成恐落尋常斷見坑要識觀音殊妙相儀文指示自分明行相云何請師敘陳觀音儀相實無端金色熒煌映紫檀白褻花裝為胳膊毗楞伽寶作天冠頂中化現無邊億項上分輝有萬般作是觀時為正觀若他觀者被渠謾儀相經文法師諷演大奮怒王真言至六字章句真言歌讚讚嘆觀音稱揚萬德身長八萬億那由他旬紫金身色肉髻項圓明滿百千億數閻浮檀金色慈尊光明照十方法界處處總皆明檀那垂憫念修崇勝會仰答洪恩蒙佛授記世世與生生福壽南山永固納東海一泒長清求懺悔罪花凋謝遐算享千春普懺罪菩薩摩訶薩下座懺悔比丘某稽首歸命十方三世三寶本師釋迦牟尼佛等上所奉請諸佛聖賢大悲觀世音菩薩憐憫覆護受我奉請顯現道場受我懺悔施主某等為法界沉淪苦趣一切衆生為發菩提心行菩薩道但以三業六根多諸罪纍三障厚重菩提行願不得現前自利利人深自尅責今日奉請諸佛聖賢大悲觀世音菩薩摩訶薩等懺悔過去今生及未來世一切惡業三業六根三障三毒自有身來流浪六道處處受形內無慧眼外近惡人開放逸門造生死業枝條花葉遍滿千二十五有無不受生死輪回無際相續無窮偶得人身犯諸重戒一切諸犯輕重篇聚多有毀犯違逆十方三世諸佛清淨妙戒若不懺悔當墮阿鼻大地獄中畜生餓鬼阿修羅道天上人間受無量苦輪回六道無解脫期今日嚴淨道場誠心懺悔不敢覆藏唯願尊者觀世音菩薩摩訶薩顯現道場放勝光明照燭身心令得淨一切戒根還得如是興隆三寶起護法心起護戒心起四攝心起慈忍心心如金剛願不更犯已犯之罪與法界衆生俱同懺悔盡未來際常得修習菩提行願生生常處淨佛國土三障永除絶三惡道永離衆苦成無上道虛空有盡我願海中懺悔發願已皈命禮三寶普為衆等志心懺悔我等自從無始劫因迷覺海性沉圓無明妄動能所生境風鼓擊波浪起由緣妄見體昏昧外感頑空相現前空分四大互相淩見起六根常融別妄將心境分成二故使一真性相殊由茲生死苦無窮如旋火輪無休息幸逢最後佛垂範因悟從前萬苦辛今投聖衆懺前愆應念化成無上道普為衆等志心發願我昔枉受輪回苦皆由心境妄緣攀而今循省已知非力行斷惑常無倦法門無盡常修學苦海彌天駕法船我今妄習頓能除願我真心常不昧願我直入三摩地願我對境悟圓通願我得果成寶王還度如是恆沙衆普為衆等志心說偈空有多聞迷實相於無漏業不能修當來苦果竟難逃直向聖門求解脫普為衆等志心回向會上因緣三世佛圓通海會佛菩薩聲聞羅漢賢聖僧摩訶般若波羅密第二時陹座加持字母陀羅尼重登寶座會集人天字母伽陀作法念誦歌讚我等虔誠一心歸命禮讚大聖觀音悲心廣大遍滿乾坤處處歸依拔苦三途八難仰望垂恩今霄夜群生瞻仰竭意甚精勤慈尊弘誓重願放毫光照燭幽冥化獄主赦囚類苦楚皆停衆生冤業解脫從茲後不復哀鳴仗佛力有情含識俱獲盡超升南無大佛頂首楞嚴經圓通海會佛菩薩忙忙苦海孰知津曠劫無由度此身惟有補陀岩畔客遍聞堪忍界中人聞聲影現千江月應物陽生萬物春幸接慈光宜想念消除黑業悟天真比丘某稽首和南敬白清淨大衆今此道場第二時中重升猊座宣演拔苦懺罪儀文大衆各宜冥心注想切勿異緣所冀法水沃心澄清雪釋預告衆慈宜戒之哉各發無上菩提心救拔罪苦儀當演歷生冤業自綢繆輪轉昏迷甚日休大士法門無畏力廣運神通應禱求衆慈靜聽師述因由救拔無邊罪苦時惟憑大士運慈悲迷途困厄多邪見聖智哀憐出苦