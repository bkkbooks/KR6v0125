body:
  text: 圓通三慧道場密教中二時入壇觀音禮拜真言無始劫來生我慢恰如山嶽聳千尋我今投地禮觀音願使慢山俱破碎唵何暮伽那麼塞迦拏薩嚩嚲詑誐跢怛惑哩吽觀音召請真言稱揚聖德將身禮禮拜能除我慢愆五輪投地誓皈依又更宣揚禮拜咒唵暮伽紇利娜野鉢頭暮瑟抳灑迦哩灑野娑陀野皤囉三皤囉摩訶鉢頭迷娑訶止迎三大士入壇密教觀音救護衆生神咒沒溺四生拘溷濁循環五道恣纏綿若非慈悲聖觀音孰與垂哀為救護多姪他嗚呼膩模呼膩閻波膩耽波膩安茶詈般茶詈首埤帝般般茶茶囉囉婆私膩多姪他伊梨寐梨鞮首梨迦婆梨佉提端耆旃陀利摩蹬耆勒叉勒叉薩婆薩埵薩婆婆耶埤娑訶多茶他伽帝伽帝膩伽帝修留毗修留毗勒叉勒叉薩婆薩埵薩婆婆耶埤娑訶觀音破惡業障消伏毒害真言南無佛陀南無達麼南無僧伽南無觀世音菩提薩埵摩訶莎埵大慈大悲唯願愍我救護苦惱亦救一切怖畏衆生令得大護多姪他陀呼膩模呼膩閻婆膩耽婆膩阿婆熙模呼膩分茶利般茶利輸鞞帝般茶囉婆私膩休樓休樓樓兜樓樓安茶利般茶梨樓樓周周膩槃茶利富富豆豆般茶羅婆私膩矧墀跈墀膩跈墀薩婆阿婆耶羯多薩婆怛婆娑陀伽阿婆耶卑離陀閉殿娑婆訶止信禮海會此咒二時升座字母真言無量總持王具足一一皆從字母生善知衆藝舉揚時天上人間皆敬仰阿多波者那囉拖婆茶沙嚩多也瑟吒迦娑麼伽他社鎖拖奢佉叉娑多壤曷攞多婆車娑麼訶婆縒伽吒拏娑頗娑迦也娑室者侘陀歌讚我等虔誠一心歸命禮讚大聖觀音悲心廣大遍滿乾坤處處歸依拔苦三途八難仰望垂恩今宵夜群生瞻仰竭意甚精勤慈尊弘誓重願放毫光照燭幽冥化獄主赦囚類苦楚皆停衆生冤業解脫從茲後不復哀鳴仗佛力有情含識俱獲盡超升南無大佛頂首楞嚴經圓通海會佛菩薩忙忙苦海孰知津曠劫無由度此身惟有補陀岩畔客遍聞堪忍界中人聞聲影現千江月應物陽生萬物春幸接慈光宜想念消除黑業悟天真比丘各發無上提綱入儀吟偈入經大悲心陀羅尼觀音親演精微句破業除災致福祥今當法會第二時轉潔身心勤諷誦仰啓月輪觀自在廣大圓滿紫金容千臂常伸現世間千眼光明常遍照一千二百真言請圓滿衆生所願心面安三目遍莊嚴頂戴彌陀持寶器宣讚真言微妙法授持當證大菩提辨才無礙化人天菩薩衆中為最上暫聞尚滅塵沙業諷誦唯增成佛因大悲願力不思議是故我今常讚誦南無大悲觀世音願我速知一切法南無大悲觀世音願我早得智慧眼南無大悲觀世音願我速度一切衆南無大悲觀世音願我早得善方便南無大悲觀世音願我速乘般若船南無大悲觀世音願我早得越苦海南無大悲觀世音願我速得戒定道南無大悲觀世音願我早登涅槃山南無大悲觀世音願我速會無為舍南無大悲觀世音願我早同法性身我若向刀山刀山自摧折我若向濩湯濩湯自枯竭我若向地獄地獄自消滅我若向餓鬼餓鬼悉飽滿我若向修羅惡心自調伏我若向畜生自得大智慧觀世音菩薩發如是願已於大衆前起慈悲心開顏含笑即說如是千手千眼廣大圓滿無礙大悲心陀羅尼即說咒曰聞經衆等罪消滅曩謨囉怛曩怛囉夜野南無阿哩也嚩路枳諦濕嚩囉野薩怛嚩野摩訶莎怛嚩野摩訶迦嚕抳迦野唵莎哩嚩婆曳數怛羅拏迦羅野怛寫銘南無塞訖哩怛嚩伊𤚥阿哩野嚩路枳諦濕嚩囉怛嚩𩕳攞建姹曩麼紇哩娜野摩嚩嘌跢以瑟吒弭莎㗚嚩羅他娑馱喃輪伴阿萕琰莎㗚嚩步跢喃娑嚩沫溧誐尾戍達劍怛你也他唵阿路計阿路迦麼底路迦底羯囒諦醯賀利摩訶冒地莎怛嚩娑摩囉娑摩囉麼麼弟子某諷誦大悲心陀羅尼伏願菩薩於空中大現久住世間與誦持弟子作大利益然後願偃旌旗於塞上臥鼙鼓於邊城永扇堯風長休殺害哀猿不向携弓死怖鴿來投佛影中游魚鳳鳥及黿龜永劫不遭羅網難毫光遍照三千界惡黨邪魔盡發心金錫振開地獄門香象永流功德水聽者念者佛弟子生生莫退大悲心法界衆生悟解人劫劫常修無諍行普令今時聞法者總使利益三界中暫時勸勉結良緣同上花臺親見佛紇哩那野矩嚕矩嚕羯哩麼娑達野娑達野度嚕度嚕尾演諦摩訶尾演諦陀羅陀羅達憐捺利濕嚩羅左羅左羅摩羅尾摩羅阿摩羅母㗚諦曀醯曳呬路計濕嚩羅羅誐尾灑尾曩捨野禰吠灑尾灑尾曩捨野謨賀左羅尾灑尾曩捨野虎嚕虎嚕摩羅虎嚕賀梨鉢那摩曩波娑羅娑羅悉哩悉哩素嚕素嚕沒地野沒地野冒馱野冒馱野昧怛哩野𩕳羅建姹迦麼寫捺哩捨南鉢羅賀羅那野摩訶莎嚩賀悉馱野娑嚩賀摩訶悉馱野娑嚩賀悉陀喻藝濕嚩羅野娑嚩賀𩕳羅建姹野娑嚩賀嚩囉訶目佉僧訶目佉野娑嚩訶鉢那摩訶娑跢野娑嚩訶作羯羅欲馱野娑嚩訶商伽攝那寧冒達曩野娑嚩訶摩訶羅矩吒馱羅野娑嚩賀嚩麼娑建馱你捨悉體跢施哩瑟拏惹曩野娑嚩賀尾也伽羅拶㗚摩你嚩娑曩野娑嚩訶曩謨羅怛那怛羅夜野那謨阿哩也嚩路枳諦濕嚩羅野薩婆訶止歌讚聖智哀憐迷途困厄為凡夫業報難停娑婆世界皆號施無畏稱名離諸衆生恐怖險道與熱惱窮貧愚癡者繫縛殺害生死與訟諍大衆不同意行惡道愛一切惡因愁憂苦惱逼迫於身心此等數端恐怖仗大悲陀羅尼功勛令救拔無邊罪苦迷逐化為塵入十惡儀畢吟偈信禮觀世音菩薩凡夫三業不清涼歷劫塵埋在苦鄉自作教他何覺悟故為誤犯少籌量了知本性元無性頓覺身光自有光今日懺除何所喻琉璃瓶內佇朝陽加持梵語神咒至觀音懺悔神咒四生九類無窮盡願發如來自在身無明三業頓消除一切圓明悉清淨仰啓真空無相教梵音不譯頗難思昔因三藏往西乾遂感觀音親教授誦念除危並滅罪聽聞獲福與延齡咸期不退菩提心一切善根速成就梵語般若波羅密多心經觀自在菩薩與三藏法師親教授梵本不潤色鉢羅誐攘播羅弭多紇哩那野素怛覽阿哩也嚩嚕枳諦濕嚩路冒地娑怛悔儼鼻囕鉢羅誐攘播羅密多左哩熖左哩野摩𠯆尾野嚩嚕迦野底娑摩畔左塞建馱娑怛室左娑嚩婆嚩戍你熖跛失也底婆麼伊賀捨哩補怛羅嚕戌你熖跛失也㗣嚕畔嚕播曩比㗚他戍他也戍他也多野曩比他蘖嚕畔夜怒嚕畔娑戍你也多夜戍你也多沙嚕畔噎嚩弭嚩吠那曩散誐沙迦羅尾誐攘南伊賀捨哩補怛羅莎羅嚩達摩戍你也哆洛乞叉拏阿怒多播曩阿寧嚕馱阿摩羅阿尾摩羅阿怒曩阿播哩布羅拏哆娑每拾哩布怛羅戍你也多你熖曩嚕畔曩吠那曩散誐攘曩散娑迦羅曩誐攘南曩斫乞芻戍嚕怛羅迦羅拏爾賀嚩迦野摩曩枲曩嚕畔攝那彥馱羅娑娑潘羅瑟吒尾也達麼曩斫乞芻馱都哩也嚩曩麻怒尾誐攘南馱都曩尾你也曩尾你也曩尾你也曩尾你也乞叉喻曩尾你也乞叉喻野嚩曩惹羅摩羅喃曩惹囉摩羅拏乞叉喻曩耨佉娑敏那野寧嚕陀摩哩誐攘曩誐攘南曩鉢羅比底南鼻娑摩野多娑每那鉢羅比底怛嚩冒地薩怛嚩南鉢羅誐攘播羅弭多摩室哩底也尾賀囉底也只跢嚩羅拏曩悉底怛嚩那怛羅素都尾播哩也娑底迦蘭多寧瑟吒寧哩嚩南底哩也馱嚩尾也嚩悉體哆娑嚩沒馱鉢羅誐攘播羅弭多摩室哩底也耨多蘭糝弭也糝沒地摩鼻糝沒馱多娑每誐攘多尼演鉢羅誐攘播羅弭跢摩訶滿怛嚕摩訶尾你也滿怛羅阿耨多羅滿怛羅阿娑摩底滿怛羅莎嚩耨佉鉢羅捨摩南莎底也摩弭替也怛羅鉢羅誐攘播羅弭跢目訖婼滿怛羅怛你也他誐諦誐諦播羅誐諦播羅僧誐諦冒地莎嚩訶梵語心經咒八囉娘婆羅密陀逆鄰那耶素怛羅訶列嚩嚕吉帝涅嚩嚕母地莎埵沒儼鼻南八羅娘波羅彌陀左熖左熖野嚩汝也嚩嚕伽耶底莎摩畔左思蹇馱莎埵寫沙婆波嚩戍涅波諦設薩嚩伊賀舍哩卜怛羅嚕畔書涅馱嚩汝畔嚕畔那鼻那戍涅多戍涅那野那彼那虐嚕畔耶𠯆耶嚕畔娑戍涅馱耶戍涅多娑嚕畔意縛微嚩吠那曩散虔娘娑娑伽羅尾伽娘伊賀舍里卜怛羅娑羅嚩達麼戍涅多洛叉拏阿耨多畔左阿寧耶嚕馱阿麼羅阿微野摩那阿奴那阿波離布羅叉多薩沒舍哩卜怛羅戍涅馱耶戍涅馱耶嚕畔南吠那奴散虔娘娑娑娑伽羅尾虔娘南斫初楚嚕怛羅伽羅拏即賀波伽耶摩那昔雪嚕畔設達言馱羅娑散八羅瑟吒尾演達麼曩斫初大都夜嚩那莫𠯆尾虔娘大都那微涅那微涅那微涅叉欲那微涅叉欲夜嚩那作羅那南那作羅縛羅拏叉欲那奴佉三昧陀耶寧羅嚩失娘鄰尾虔娘八羅微底那脾薩摩耶多薩沒南八羅微底娑多沒地薩埵南八羅娘波羅彌陀嚩室鄰也尾賀羅野只多嚩羅拏只多嚩羅曩昔體答摩那八羅速都尾波哩薩帝訶羅那寧瑟吒尾寧摩那的鄰達麼野縛昔體多薩埵沒馱八羅娘波羅密陀嚩室鄰也奴答覽三耨三菩提摩鼻莎滿多嚩濕尾演達磨叭囉娘叭囉密哆摩訶曼怛囉阿莎摩莎鼻曼怛羅莎嚩奴伽叭囉那莎底耶麼舍贊野達麼叭囉娘婆羅密哆慕忌度曼怛羅雪帝雪帝婆囉雪帝波羅僧雪帝菩提娑婆訶觀音懺罪神咒觀音大士慈悲力演說伽陀懺罪愆我今悔過願哀憐所仗密言得清淨那謨喝囉怛那多囉夜耶那謨阿唎耶皤盧枳羝鑠皤囉耶菩提薩埵婆夜麼訶薩哆婆夜麼訶迦盧你迦耶多姪他覩嚕覩嚕阿西麼西麼西麼訶麼唎泥枳社婆摩唎尼杜鼙杜鼙那謨那謨薩婆訶止歌讚自作教他故為誤犯殺生命飲藥劑冤讐以求攻伐傷害結怨尤恣之非所盜戀淫欲兩舌無休並綺語妄言狂詐善惡不分由貪嗔並癡暗十惡業為遂作愆尤千生在念百劫不忘憂懇禱菩薩懺悔從今後改往新修身清淨菩提路上撒手恁遨遊觀音感驗入儀入經畢吟此偈觀音垂願化娑婆接引衆生出愛河靈驗昭彰難可述神通變現孰能過自知悟道方成佛益已安禪便利他念念念成無想念分明具足六波羅獸走經文法師諷演加持觀音一字真言觀音感驗威神力消諸難事破魔軍能令怖畏宿愆消是不壞身堅固力唵喉中擡聲引𠰄觀音二字真言唵上步引觀音三字真言唵鉢頭米觀音四字真言唵鉢頭麼訖唎觀音五字真言唵鉢頭麼步臡觀音六字真言唵鉢頭摩皤路迦觀音七字真言唵鉢頭麼叭嚩攞𤙣姪力觀音八字真言唵暮伽麼抳鉢頭米觀音九字真言唵鉢頭麼路者禰虎嚕𤙣觀音十字真言唵鉢頭麼瑟抳灑弭麼哩𤙣步觀音菩薩陀羅尼南無大悲觀世音師子無畏音大悲柔軟音大梵清淨音大光普照音天人丈夫音能施衆生樂濟度生死岸陀羅尼曰南無觀世音菩薩跢擲跢丘丘梨梨頭姹頭姹波度斯麼彌波羅呵羅哆娑婆賀大悲觀世音菩薩南無勒囊利夷蛇南無阿哩蛇婆路吉坻舍嚩羅蛇菩提薩埵蛇摩訶莎埵蛇伊𬁜多萌婆羅婆叉彌佛婆禪麼比至室士耽莎埵南無勒囊利蛇蛇南無阿利蛇婆路吉坻舍伏羅菩提薩蛇摩訶莎埵蛇多擲跢修目企毗目企伏流修目企波輸那濘比輸那摩訶毗哆婆兜麼富抵婆婆抵哆婆首沙兜薩婆訶觀音燈供養真言圓通大士慈悲力極樂補處紹如來法身密語盡宣揚早令今時來授記唵暮伽麼訶囉濕珥入嚩囉娑歌塞入嚩羅入嚩羅三曼羝薩嚩訶花供養真言唵𮄽鉢頭米𤙣香供養真言唵鉢頭麼米伽三皤囉米𤙣果供養真言唵暮伽紇哩訶拏訖哩虎𤙣泮吒酥乳蜜供養真言唵素魯素魯禁皤底娑嚩訶咒鬼神真言唵暮伽漫陀𤙣吽吒觀音禁惡鬼真言唵暮伽鉢哩底訶多唵𤙣吽𠰢吒觀音禁惡魔真言唵暮伽帝嚴路枳耶毗闍那俱魯麼𤙣吽𠰢吒觀音禁諸魔真言唵暮伽羅叉娑婆訶如意輪陀羅尼咒南無喝囉怛那怛囉夜耶南無唎耶婆嚧吉帝什伐囉耶