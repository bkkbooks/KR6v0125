body:
  text: 圓通三慧道場密教上觀音勝會啓壇場先咒柴油水米香安息飛煙雲霧捲蘭膏發焰慧燈光緇儒濟濟皆精潔賢聖巍巍盡讚揚法雨滿空甘露灑道場何處不清涼提綱咒柴儀文吟偈松篁檜柏長青峰自古須憑造化工一帶根莖藏厚土十方枝葉映長空斧斤伐處聲允切爐竈燒時火自紅幸遇丹霞慈愍故也教木佛現神通加持咒柴真言觀音感驗難思議能與衆生作福田柴油淨水誦真言所冀吉蠲無觸穢南無佛馱耶南無達麼耶南無僧伽耶南無阿利耶跋路吉羝攝婆羅耶菩提薩埵耶摩訶薩埵耶摩訶迦嚕尼伽耶多姪他阿私他私呼樓呼樓周樓蘇樓蘇樓娑婆訶大明神咒經胡麻巨勝長東西氣味相同也大奇全仗壓時無濁穢自然用處兩相宜喚他童子燃燈處勝彼書生鑿壁時夜靜更存方寸現光明照處碧琉璃加持咒油真言壓油縱有傷生誤破暗寧無利物心更憑密咒作加持爍破群昏無限量南無佛陀耶南無達麼耶南無僧伽耶南無阿利也跋路吉羝攝婆羅耶菩提薩埵耶摩訶薩埵耶摩訶迦嚕尼迦耶哆姪他私利私利地利地利私利地利薩訶止大悲咒泉河滾滾向東流古往今來卒未休岸次雙雙藏宿鷺波心對對泛浮鷗一川大凍宜光武萬里前程問子由江上曉來堪畫處三三兩兩釣魚舟加持咒水真言妙湛靈源常混混真空性水自淵淵衆生無始妄情昏普願霑濡心垢淨唵暮伽惹羅跋羅塞攞臡吽止尊勝咒本來炙地與熏天自在門中獨占先一炷氤氳充象藏十方貴重表龍涎鼻中嗅著休空過會上拈來信有緣為報合筵諸大衆圓通法會好參禪咒香真言佛世比丘燒沉水香嚴聞已悟圓通檀那敬請聖觀音拙具羅香憑此咒唵鉢頭迷旃檀麼尼摩訶遮伐羅吽止深耕易耨大奔波春碾冬藏事若何腳力盡時全售用法輪轉處總篩籮養親曾子猶嫌少畫餅雲門絶厭多願與化為禪悅食大家齊唱太平歌加持咒米真言心地清涼由法力色身安快仗資糧我今稱讚此真言菩薩天人常賜我唵縛囉哩耶娑賀止諸部因緣先誦大明神咒經梵語心經陀羅尼仰啓真空無相教梵音不譯頗難思昔因三藏往西天遂感觀音親教授誦念除危並滅罪聽聞獲福與延齡咸期不退菩提心一切善根悉圓滿叭囉娘波羅密多逆憐那耶素怛囉阿列嚩嚕枳帝濕嚩盧母帝薩嚩沒嚴鼻藍叭囉娘波羅蜜多左焰左焰嚩汝耶嚩嚕迦帝薩麼畔左思蹇多莎埵寫娑嚩婆嚩戍涅婆設帝莎嚩曳賀舍利卜怛囉嚕畔戍涅戍涅馱嚩汝畔嚕畔那鼻那戍涅馱戍涅馱耶那彼那雪嚕畔野嚩雪嚕畔娑戍涅馱耶戍馱娑嚕畔意嚩微嚩吠那曩娑虔娘娑虔娘伽囉尾虔伊賀舍利卜怛囉娑哩嚩達戍涅馱洛叉拏阿耨多畔左阿寧耶嚕馱阿麼囉阿微耶摩那阿奴那阿波離布囉拏多娑摩舍利卜怛囉戍涅多戍涅多那嚕畔曩吠那娘娑虔娘娑虔娘伽囉尾虔娘囊者楚嚕怛囉伽囉拏伊賀娑伽耶摩那昔雪嚕畔設達言怛囉娑娑叭囉瑟吒尾演達磨囊者初大都夜嚩那嚕奴尾虔娘大都那尾娘那尾娘叉欲那微涅叉欲也嚩那作囉嚩囉那囊作囉嚩囉拏叉欲那奴伽三昧陀囉寧嚕多嚩失憐娘尾虔娘那八囉微底那鼻三摩耶多莎麼那八囉微底莎埵沒地薩馱喃叭囉娘波羅蜜多嚩室鄰也尾賀囉耶枳多嚩囉拏那昔體答摩那八尾波囉娑帝伽囉那寧瑟吒寧侫摩那的憐達摩也嚩昔地多薩多沒馱叭囉娘波羅密多嚩室憐耶奴怛囉三藐三菩提摩鼻三滿多嚩室鄰娘尾演叭囉娘波羅密多摩訶滿怛囉摩訶尾欲曼怛囉阿耨多羅曼怛羅阿薩摩莎鼻曼怛囉奴伽八囉射嚩那娑底耶麼舍尾演達麼叭囉娘波羅密多摩訶曼怛囉怛囉恆誐多雪帝雪帝波囉雪諦波羅僧雪諦菩提娑婆訶止聞經衆等灑淨回向初時入壇密教加持淨口業真言為念衆生十不善妄言綺語罪根多宣揚密咒陀羅尼是故名為淨口業唵暮伽弭麼隸爾嚩迦囉僧輸馱禰鉢頭麼俱麼攞爾嚩僧輸他野陀羅陀羅囉弭麼𠼝娑婆訶止加持潔滌真言凡夫垢染無邊量歷劫無由得洗除今將潔滌演真言庶使道場獲清淨唵弭摩囉戍悌吽止加持入壇真言欲伸崇奉觀音會先須誦念入壇言聖人施設不徒為意使道場嚴勝事唵弭補攞鉢頭麼慕伽婆囉縒囉跛囉弭捨覩矩嚕矩嚕娑婆訶止加持燒香真言信心一念周沙界五分香雲遍十方願憑感格聖賢心寶網光中齊出現唵跋折囉杜鞞惡止加持別界真言欲潔誠心祈淨聖凡庸所處垢濁多我今持咒繞香壇憑此結成金剛界唵三曼嚲末嚕𡫸哩茶塞室哩吽止加持散花真言欲解珠瓔當奉佛先持百卉貢慈顏貫花盈裓表勤恭均散寶壇陳佛事唵慕伽拏舍縒野鉢頭麼蔓度梨吽止加持三寶真言曩謨沒馱耶遇囉吠南無達麼耶馱以弭南無僧伽耶摩訶諦帝隸毗藥毗舍左迦麼囉穆佉迦麼囉路左喃迦摩囉娑娜迦摩囉賀薩多迦摩囉婆畝寧迦磨囉迦磨囉三婆嚩莎迦摩囉囉乞叉囉南無窣堵底入儀比丘云云吟偈菩薩修行願力深光明山上運悲心雲鋪碧落成慈意潮震滄溟吐梵音千貝輻輪文紫玉萬題胸字色黃金耳通眼慧希昭鑒此日香壇佇降臨證圓通觀世音菩薩嘆佛宣疏多陀阿大衆齊誦警策偈警策諸人切至誠制心一處善芽生凡夫境界塵埋沒佛法門庭路垣平速捨魔王煩惱窟求登大覺涅槃城齊稱偈讚祈延壽伸追薦合掌聽宣治路明加持治路明真言七遍聖人來往雖無礙更演密言治路明意令凡輩起誠心翹望觀音臨法會唵鉢囉弭眝皤伽伐底莫賀野莫賀野惹野莫賀眝娑婆訶止入儀禮請上聖儀當演又按菩薩所山號光明小白花石階舍利産靈芽八功德水清堪玩五色祥雲翠可誇瑪瑙階前排寶樹琉璃池畔映金沙天香間發鳴仙樂菩薩毫光散彩霞一心皈命禮正南印土補怛洛山華則有拘物頭華鉢頭摩華木則有