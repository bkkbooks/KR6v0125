body:
  text: 圓通三慧道場開壇舉佛龕任意圓通海會佛菩薩二聲拜下和二遍開壇門部儀當演和經題法不孤起仗境方生法隨法行法幢隨處建立法幢既立必有因由今此妙會由致先當入壇清淨三業潔滌香壇結界散花以為佛事今乃清淨三業自有儀文當為宣揚各希諦聽宣儀守口如瓶直下大自在我開聲悟道現前小白花山自樞機輕發而費顧賢庸致言行相乖而撥無因果鼓揚三寸舌散盡一家春起平地之風波造彌天之口過今欲回光返照改往修來自己觀音自己稱聞思修入三麼地身口意業本來同一念迷真失本宗喝散障雲無點翳一輪杲日照長空除蓋障菩薩摩訶薩經云聞法歡喜讚乃至發一言則為已供養一切三世佛今讚圓通之妙相先淨口業之過愆咸吐優鉢華香共成無礙才辨加持淨口業真言三業六根悉清淨潔滌論文聲色場中幾度迷頭認影補陀山下一回刮垢磨光既霑楊柳之微甘更藉軍持之餘潤同入十種法界共證三摩地門澡雪塵土顏願聞第一義八功德水自天真善洗衆生業垢塵流入毗盧華藏界箇中無處不超倫楊枝手觀世音菩薩提綱外起身語意內表心所思譬喻潛泉魚鼓波還自舞凡庸識質垢染滋多願仗密言以伸蠲滌加持誦潔滌真言月光童子大菩薩入壇論文和光同塵聖凡交參之始升堂入室人天際會之初惟行事之權輿在傾誠而感應文殊皈逢智積妙音來見釋迦須憑咒力之光容以印覺皇之大士聚沙成塔亘青天舉指分明在目前法界蕩無塵一點自然涌出一枝蓮普莊嚴菩薩摩訶薩妙音來處堪忍界先現寶蓮花殊勝還意靈鷲山親乘金蓮座衆等身為供養具合掌以為花善心真是香共意圓通境加持入壇真言雪山童子大菩薩燒香論文提綱上來奉行入壇已竟今當燒香以為佛事一節儀文謹當布露宣儀福根智種清淨心株或稱雞舌之名或標牛首之號可以靈山達信堪憑海藏通誠薰成戒定慧香供養聖觀自在更宣密咒以表信心五分法身真妙香人人具足露堂堂無根樹下親拈出供養圓通大法王香供養菩薩摩訶薩加持誦燒香真言香嚴童子大菩薩別界論文車書道共聞四海之一家凡聖岐頭便殊途而異轍雖悟道不分於畦畛奈人心強立於疆郵故靈山變者三而楞嚴結壇九所以東西南北率歸統御之中坐臥經行盡入提封之內更憑神咒以示方隅荊棘林中業火生經由大地任縱橫金剛界出摩訶力直向如來行處行尊勝幢菩薩摩訶薩提綱華藏一微塵詮真含法界寶光能現佛如來剎自在塵緣永隔障礙猶多密語宣揚十方清淨揭諦揭諦四天王統領鬼兵降道場守護東西南北去邪魔外道悉逃亡加持誦結界真言金剛界菩薩摩訶薩舉偈振鈴持咒繞香壇八句大衆繞壇結界至完散花散花散仙花遍河灑來供養五方位尊佛南無花供養菩薩三聲憑此結就五方各色界二聲不許邪魔入道場浪皮叉散花儀範古有常規知經先行點淨檀信捧爐後隨知會舉唱散花文大衆隨音後和散花論文謹當布露夫此花者剪自金刀故不待東君著意開從玉筍偏能與造化爭強天然葉葉聯芳特地枝枝挺秀任使遊蜂錯過從教舞蝶顛狂玲瓏絶豔厭姚黃嫋婐翠深欺魏紫盈盤捧出繽紛花雨落晴空滿掬持來繚繞香風匝寶座真可謂靈山親得旨再去露真機大衆虔誠請念散花說偈一花五葉祖師傳淺白深紅有萬般宴座巖前無說處紛紛墜落紫雲端如常繞壇散花至回壇念花供養菩薩摩訶薩舉寶檀花菩薩摩訶薩四聲提綱佛成正覺天雨寶花今此道場密然殊勝資聖賢之偉蹟示剎土之莊嚴頻散寶花以為供養加持誦散花真言蓮花手觀世音菩薩入儀文上大衆至誠心同誦歎佛偈頂螺青紺雲盤翠肉髻珠紅果豔分照曜朦朧五彩明當空宛轉千花秀真身觀世音菩薩提白欲登千里之程資糧為首要越三祗之道行業當先心心愈篤於煉磨念念可期於升進佛法僧是名常住戒定慧克著薰修行事之初必先參禮皈依之法現有常規衆等至誠同音讚助南無一心參禮本師釋迦牟尼佛願共諸衆生一心頭面禮南無一心參禮導師無量壽尊佛願共諸衆生一心頭面禮南無一心參禮觀音菩薩摩訶薩願共諸衆生一心頭面禮南無一心參禮勢至菩薩摩訶薩願共諸衆生一心頭面禮南無一心參禮圓通海會諸聖賢願共諸衆生一心頭面禮歸依海會佛菩薩加持誦皈依三寶咒惟願慈悲常攝受比丘某等稽首和南敬白清淨大衆今此修建觀音道場第一時號曰集福延壽法事分為十節敘述齊意歎佛宣疏警策大衆禮請上聖啓祝拜召勸發四心修證本末釋名攝化存念觀音觀音儀相且第一敘述齊意者按法苑珠林云宋元嘉十九年臨川王作鎮廣陵請釋道冏供養其年九月於西齊中作十日觀音齊已到九日夜四更盡衆僧皆眠冏起禮拜還欲坐禪忽見四壁有無數沙門悉半身出現一佛螺髻分明有一長人拈香授冏冏不肯受壁中沙門語云冏公可為受者以覆護主人俄而霍然無所復見以此言之晉宋之間十日觀音齊儀也今則年代已遠其儀不可得知但菩薩與衆生有緣人間信奉今此大齊止備通霄供養切在繫心一處不生妄想今當念菩薩聖號五聲輒吟一偈然後嘆佛宣疏舉觀世音菩薩五聲菩薩修行願力深光明山上運悲心雲鋪碧落興慈意潮震滄溟吐梵音千貝輻輪文紫玉萬題胸字色黃金耳通眼慧希昭鑒此日香壇佇降臨證圓通觀世音菩薩嘆佛宣疏多陀阿伽度阿羅訶三藐三佛陀大智慧師大慈悲父大圓明鑒大般若船言其修道則投身飼虎割肉餧鷹言其出世則過去莊嚴未來星宿自三無數劫之勤苦得十有一地之妙門普被十方盡世出世間之殊勝初行七步表天上天下之獨尊以三十二相示化緣以千百億身度群品如紅菡蓞自是莊嚴如淨琉璃了無瑕穢其無涯如海中水其無畏如獸中王具一切威成一切智四辨八解豈獨為西方之聖人三明六通大將濟賢劫之世界若乃理融真際體寂太虛不可以方處期不可以形限量極乎觀窺之外絶乎思慮之端萬德俱圓二邊莫立其於法實無所說其於功不可思議是以歸心者獲福塵沙悟道者致身聖地水澄秋月現懇禱福田僧惟有佛菩薩是真歸仗處南無圓通海會諸佛菩薩佛功德海難盡讚揚禮請疏章臣僧宣讀奏樂送疏宣畢天堂化納回壇凡情上達大圓鏡警策大衆儀當演和經題今當第一時中欲伸禮請上聖先須警策大衆各各志誠如法應和道場清淨衆各各當至心至心勤皈依至心勤禮拜大聖大慈悲觀世音菩薩惟有觀世音能延人壽命惟有觀世音能延人福祿是故我等衆今日須控告惟願聖慈悲開受我等請令我壽命長永修一切善令我福祿盛厚結一切緣今日已往去永不復退轉二說如若薦拔接念惟有觀世音靈功被幽顯惟有觀世音誓度諸有情是故我等衆今日須控告唯願聖慈悲開受我等請令我所薦嚴承此妙善力往生光明山親禮紫金容日聞微妙法超證最上乘今日已往去永不復退轉信禮觀世音菩薩吟偈警策諸人切至誠制心一處善芽生凡夫境界塵埋沒佛法門庭路坦平速捨魔王煩惱窟求登大覺涅槃城齊稱偈讚祈延壽伸追薦合掌聽宣治路明大悲觀世音菩薩按如意輪陀羅尼經云欲奉請菩薩時持香爐誦治路明真言七遍開治空中道路關鑰辟除一切警覺聖觀自在及諸聖衆加持治路明王真言七遍治路明觀世音菩薩禮請上聖義當演和經題又按菩薩所居補陀洛山亦曰布怛洛迦山亦曰逋多羅山皆梵言也亦曰小白花山蓋其山多此花芬馥非常因以為名華嚴經謂之光明山今既啓請上聖不敢遽然指斥所以先述所居之山山號光明小白花石階舍利産靈芽八功德水清堪玩五色祥雲翠可誇瑪瑙階前排寶樹琉璃池畔映金沙天香間發鳴仙樂菩薩毫光散彩霞南無觀世音菩薩胡跪讚禮一心皈命禮正南印土補怛洛山華則有拘物頭華鉢頭摩華木則有寶娑羅木耽摩羅木八功德水是處汪洋五色慶雲當空燦爛石階舍利草盡吉祥靈禽出多種之妙音異獸有自然之慈性天香間發仙樂長鳴衆寶輝華半月滿月諸神侍衛星天日天是善財親見之光明乃菩薩所覩之奇勝善知識者十力妙寶善知識者一切法雲善知識者則是如來善知識者無盡智藏願垂哀愍俯察凡庸今日今時來臨法會衆和受請供養吟偈觀音住在補陀山自在逍遙日月間自把數珠還自念慈觀諸趣復慈顏神通遊戲諸三昧相好端嚴四八般大衆返聞聞自性相逢只在剎那間真身觀世音菩薩加持誦觀音禮拜真言至奉請真言大佛頂首楞嚴經禮請聖賢胡跪釋迦如來是娑婆之教主無量壽佛乃觀音之本師先當禮拜二如來為首當禮拜時受請供養誠心仰請娑婆教主本師釋迦牟尼如來現居安養無量壽如來觀音本師過去寶藏佛金光獅子遊戲佛觀世音自在如來正法明王如來清涼寶山億萬同名觀世音菩薩伏願六通鑒照俯降道場副我願心集福延壽薦嚴度脫和受請供養誠心仰請遍法界中大聖大慈觀自在菩薩旖墓伽觀世音菩薩抳羅健姹觀世音菩薩播拏目伽觀世音菩薩毗俱胝觀世音菩薩濕廢多白身觀世音菩薩半拏羅婆枲抳觀世音菩薩伏願六通鑒照俯降道場副我願心集福延壽和受請供養誠心仰請遍法界中蓮花頂祕密心神通自在曼拏羅觀世音菩薩廣大明王央俱捨觀世音菩薩不空悉地王觀世音菩薩不空羂索觀世音菩薩根本蓮花頂觀世音菩薩不空廣大明王觀世音菩薩伏願六通鑒照俯降道場副我願心集福延壽和受請供養誠心仰請遍法界中大可畏明王觀世音菩薩蓮花明王觀世音菩薩馬頭觀世音菩薩青項觀世音菩薩大忿怒王觀世音菩薩太白觀世音菩薩除八難仙觀世音菩薩如意輪觀世音菩薩伏願六通鑒照俯降道場副我願心集福延壽和受請供養誠心仰請遍法界中吉祥觀世音菩薩救生觀世音菩薩一首三首五首觀世音菩薩七首九首十一首觀世音菩薩一百八首千首萬首觀世音菩薩八萬四千爍迦羅首觀世音菩薩四面大悲觀世音菩薩伏願六通鑒照俯降道場副我願心集福延壽和受請供養誠心仰請遍法界中二臂四臂六臂八臂十臂觀世音菩薩十二臂十四臂十六臂十八臂二十臂至二十四臂觀世音菩薩四十二臂大悲靈感觀世音菩薩伏願六通鑒照俯降道場副我願心集福延壽和受請供養誠心仰請遍法界中一百八臂千臂萬臂八萬四千母陀羅臂觀世音菩薩二目三目四目九目一百八目觀世音菩薩千目萬目八萬四千清淨寶目觀世音菩薩觀音種族一切菩薩觀音給侍一切菩薩觀音勝友大勢至菩薩伏願六通鑒照俯降道場副我願心集福延壽和受請供養上來禮請圓通會上第一時中諸佛諸大菩薩已蒙雲臨道場伏願衆和天眼遙見慧耳遙聞他心遙知神通遙鑒以大願力起無緣慈憐愍有情哀受我請慈悲護念降臨道場證盟此齊充遍法界願此善力廣大無邊猶若虛空具諸功德奉請已一心皈命禮常住三寶蓮花捧足降臨來觀音古佛大慈悲權現菩提薩埵儀足下黃金千輻相頂門心月一雙眉初回啓請蒙垂降合掌虔誠再禱祈欲請上乘獅子座先持啓白陀羅尼請圓通觀世音菩薩加持誦觀音啓白真言至請座真言南無歡喜藏牟尼寶積佛啓祝真靈儀當演和經題按楞嚴經云此觀世音菩薩有大願力與娑婆世界一切衆生無量安穩若有衆生能志心供養禮拜稱念者即能得世出世間之如意故求妻得妻求子得子求三昧得三昧求長壽得長壽雲來集菩薩上香設拜又按大悲心經云為諸衆生得安樂故除一切病故得壽命故得富饒故滅除一切惡業重罪故離障難故增長一切白法諸功德故成就一切諸善根故遠離一切諸怖畏故速能滿足一切諸希求故據此二經所說觀音大士神通慈護豈能稱量今既仰請聖慈已蒙降臨所有施主合門尊幼表裏宗親是男是女若良若賤伏冀憑仗法力康寧色身日擁百祥同膺上壽設拜南無越三界菩薩上來迎請觀音大聖已沐降臨今當召請天主帝釋大梵天王二十八天諸賢聖衆五通仙人十王六曹地府靈官五嶽四瀆山川水府天上地下一切靈神天下地上一切靈神當處龍神土地本家供養福德善神並願降臨瞻禮菩薩近代高僧凡修水陸齊召請天曹地府水府部衆皆先開五路然後門外以華梵降神今此觀音道場只於壇中召請蓋所憑者菩薩之密印所仗者菩薩之祕言仰賴威神必能降臨而況天主帝釋五通真仙一切靈祇皆奉一切佛敕苟密印虔結祕言載揚何慮五路之不通決定一時之來集南無天藏王菩薩設拜今當召請天官部衆欲界六天色界一十八天無色界四天所謂欲界六天者一曰四天王天東方持國天王主領乾達婆及毗舍闍南方增長天王主領鳩槃茶及閉黎多西方雜語天王主領龍王及富單那北方普聞天王主領夜叉及羅剎二曰忉利天則在須彌之絶頂三曰焰摩天則為風輪之所持四曰兜率天五曰化樂天六曰他化自在天此皆由布施戒定之妙因是以得快樂光明之善報所謂色界一十八天者自在梵身以至摩醯首羅所謂無色界四天者自無量空入以至有想無想若乃日宮有方二十里之寶座月宮有壽五百歲之子孫衆星則以水精為城真仙則以皓鶴為馭雷以四大交觸電以四光共成風伯異乎八方雨師分乎三種並願承大悲之妙力降此夕之香壇瞻禮聖容開受供養設拜加持召請四天王印咒至天龍八部咒南無地藏王菩薩至如地官部衆抑亦不同在儒則有后土富媼之靈在釋則有十王六曹之位州分四鎮嶽辨五方丘陵原隰之有神山林墳衍之有守奈洛迦獄莫非惡業之所居薜荔多徒是為餓鬼之最劣邪魔魍魎嬛魄孤魂託影隨光依草附木然以佛法平等慈施均饒今日道場輒同召請並願承大悲之妙力降此夕之香壇瞻禮聖容開受供養南無龍藏王菩薩又若水官部衆所在亦殊小則有溝洫澮川大則有江河淮濟海著八德龍分四王濕生資巨細之形靈府異尊卑之職並願承大悲之願力降此夕之香壇瞻禮聖容開受供養設拜南無願往生菩薩所有施主先亡遠祖內外一切宗親眷屬若是已生人道即承斯善力增助福緣其有或生天宮或未生天宮或證果位或未證果位及所薦某並本音先亡遠祖內外幽靈五姓含情諸甶子等並願承大悲之妙力降此夕之香壇瞻禮聖容開受供養設拜南無聰明藏菩薩其有名存祀典功被生靈代上帝之慘舒柄下民之禍福天上地下一切靈祇天下地上一切靈神或典籍所未嘗言或言談所不能遍及當處龍神土地等並願承大悲之願力降此夕之香壇瞻禮聖容開受供養設拜楞嚴經說聖觀音能接衆生入覺林真觀既同清淨觀梵音無異海潮音鐵輪磨頂情非捨金鑒為懷誓不成世出世間如意事專誠啓祝定隨心南無觀世音菩薩加持閻羅王咒至灌頂清淨咒大佛頂首楞嚴經回向無上佛菩提四聲開壇寶誦妙通玄地湧聲雷鎮上天綿綿福果善修來湛湛心如明鏡臺臺鏡明如心湛湛來修善果福綿綿天上鎮雷聲湧地玄通妙誦寶壇開
