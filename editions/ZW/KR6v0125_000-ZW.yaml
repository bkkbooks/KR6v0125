body:
  text: 圓通三慧大齋道場儀作者宋侯溥整理者侯沖題解圓通三慧大齋道場儀又名三慧圓通大齋道場儀觀音道場儀觀音大齋儀圓通科觀音科觀音儀觀音齋等中國佛教宋代科儀著作亦為明清雲南阿吒力僧和西南諸省應赴僧習用科儀八卷宋代成都府教授侯溥集著本科儀以大佛頂如來密因修證了義諸菩薩萬行首楞嚴經觀世音菩薩普門品等佛經為主要依據參證各種觀音靈驗故事編撰而成侯溥字元叔河南人曾任眉州著作佐郎和成都府教授據續資治通鑑長編載侯溥熙寧三年曾應賢良方正科侯溥稱災異皆天數又用王安石洪範說云肅時雨若非時雨順之也德如時雨耳眾皆惡其阿諛而黜之時值王安石新政朝廷朋黨甚盛但王安石深得宋神宗信用史載此年舉賢良方正朝廷諸臣曾為是否錄取孔文仲爭議再三孔文仲雖得反王安石者極力舉薦但終因王安石之反對而遭黜而本科儀署名眉州著作佐郎成都府教授侯溥賢良集證明侯溥雖遭反王安石者極力反對但最後還是中了賢良方正科未曾被黜本科儀署名亦可與畫繼中侯溥賢良相呼應以糾史乘之錯誤侯溥善文翰與當時文人趙抃蘇軾王箴眉州人蘇軾之妻兄侯仲遄等均有交遊或有唱酬可參見成都文類蜀中廣記范太史集等在編撰本科儀時侯溥還引錄了趙抃西園圓通頌部分內容關於侯溥撰寫圓通三慧大齋道場儀之事史籍亦有反映畫繼載智平成都清涼院僧也善畫觀音南商毛大節得其像以歸過海風浪大作開展懇祈光相忽現如大月輪長久之間已數千里侯溥賢良載之觀音儀中今水陸院普賢閣所畫像其徒虛己作水石見存侯溥之卒年未詳根據本科儀卷首宋元豐元年趙林序稱觀音齋者眉州著作佐郎侯君元叔之集也元叔於予為故人謄書見及求為之序則其年侯溥健在又范太史集卷四九右武衛大將軍贈華州觀察使追封華陰侯墓誌銘稱侯諱仲遄字行可初與教官侯溥遊甚欵密溥死累年因過其墓作詩以弔之元祐二年正月己巳卒侯仲遄逝於元祐二年故侯溥應卒於年到年之間碑文中且有溥死累年云云揆諸當時情狀侯溥或卒於年前後續資治通鑑長編載陶及溥皆眉州人但東坡油水頌跋尾題熙寧四年八月九日河南侯溥元叔題說明侯溥自己稱是河南人續資治通鑑長編載侯溥為眉州人或因侯溥曾為眉州著作佐郎之故除了圓通三慧大齋道場儀外侯溥尚有著作數種傳世見收於成都文類四川通志全蜀藝文志國朝二百家名賢文粹等經點校整理大都已收入全宋文卷和卷今將其唱和趙抃西園圓通頌的詩西園圓通頌錄文作為附錄以為參考本科儀未見中外佛書載錄亦未為歷代大藏經所收但形成後即廣泛流行宋紹興十二年大足地區已有人據之修設圓通妙齋年貴州沿河縣尚有應赴僧據之舉行觀音圓通勝會本科儀至今未發現印本據筆者所知有如下數種抄本傳世一清光緒抄本該抄本未見教誡儀文故已非全本二昆明應赴僧左光福先生藏復印本該本與清光緒抄本內容大同小異但編排差別較大與光緒抄本僅分為教誡儀文初二三時儀文教誡初二三時提綱和教誡初二三時密教四類共八冊不同該抄本分為教誡儀文教誡綱密初二三時請佛綱密初二三時儀文初二三時儀密初二三時綱密表懺緣由儀文七類共十四冊排列組合較為煩瑣該抄本略有殘頁從行文不避諱玄弘等字來看或為清初以前抄本惜未見復印所據原抄本尚不能作最後判定三民國抄本存三慧圓通道場開壇請佛結界散花三慧圓通道場第二時中密經贊偈兩冊前者卷末題記稱該抄本系應赴僧密士仁沛姓高名如山字玉山號映堂為補配清光緒本於年所抄但這兩冊與光緒抄本相配仍然不全四甘肅麥積山石窟藝術研究所藏明抄本從公佈的目錄看該抄本主要存密教和儀文部分未見教誡和提綱部分故亦不全五雲南省昆明市某處所藏舊抄本据藏者介紹由於殘破已經無法據之舉行法會詳情待查由於筆者掌握的圓通三慧大齋道場儀編排秩序各不相同諸抄本殘缺部分不能相互補充因此在整理時衹能根據科儀搭配組合的程式以清光緒抄本提綱為線索盡可能補全清光緒抄本對清光緒抄本殘缺的教誡儀文部分以左光福先生藏復印本民國抄本相對應內容補配對清光緒抄本未錄但在舉行法會時要與儀文配合使用的經文則根據民國抄本補入為避免打亂光緒抄本順序補入經文錄於注釋中因此整理本是三種抄本的綜合本但是整理本目前仍不完整主要存在三個方面的問題第一因條件限制此次未能參校甘肅麥積山石窟藝術研究所藏明抄本雲南省昆明市某處所藏舊抄本第二清光緒抄本中一些見於儀文的程序在提綱中缺省衹有綱目而在左光福先生藏復印本中找不到對應的文字無從補配暫時衹能存目第三與儀文相配合的經文未能補全在筆者所見諸本中僅民國抄本中單獨抄錄了與光緒抄本儀文中相配合的經文但由於民國抄本不全衹有與光緒抄本儀文中相對應的經文沒有與光緒抄本儀文上下相對應的經文所以與儀文相配合的經文亦不全上述不足衹能留待將來補足更希望將來能夠發現新的完整的傳本盡管如此對於備受學界關注的觀音信仰研究來說本科儀無疑提供了一份新的材料按照藏外佛教文獻之錄文校勘體例本次整理存在轉換底本的情況具體情況是底本按先後順序排列昆明應赴僧左光福先生藏復印本民國抄本清光緒抄本校本由於本文獻情況特殊校本的使用也較複雜與特殊詳述如下以昆明應赴僧左光福先生藏復印本為底本時僅以光緒抄本提綱參校稱之為甲本以民國抄本為底本時僅以昆明應赴僧左光福先生藏復印本參校稱之為甲本詳情隨文說明以光緒抄本為底本時以昆明應赴僧左光福先生藏復印本為甲本以民國抄本為乙本由於甲乙本與底本內容組合有較大差異僅擇甲乙本中可校者參校由於科儀往往通過內容互見的方式來進行連貫不少內容在同一種抄本的教誡提綱儀文密教中往往會重復出現故光緒抄本各本相互間內容重出時對重出內容亦作適當的互校由於諸底本與校本的文字不能完全對應故本文獻僅註明諸底本的起訖對於校本的起訖不一一註明在校記中也不一一註明各校本的行文由於現在能夠利用的諸本均殘缺不全故藏外佛教文獻在此所發表的文本實際是按照科儀程式綜合現有各種資料對圓通三慧大齋道場儀重新進行整理的結果這種整理方法已經超出藏外佛教文獻原定的錄文校勘體例的有關規定屬於一種新的佛教典籍的整理方法目前民間流傳的科儀傳本大多殘缺不全不少文獻的現存形態均類似圓通三慧大齋道場儀應該如何整理這類文獻對我們來說也是新的課題因此藏外佛教文獻力圖探索一種整理這類科儀文本的新方法這次對圓通三慧大齋道場儀的整理就是一種嘗試上述努力的效果如何要請讀者諸君檢驗錄文圓通三慧大齋道場儀
