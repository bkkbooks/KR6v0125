業為基因此十端遂成罪釁或生怨恨或結債讐無始劫來遞相報答有一言為慊而千生在念有一事為負而百劫不忘今日今時對菩薩前願從懺悔一懺悔已更不復作若人負我者便忘憶念我負人者願獲消除輒勞僧眾為施主懺怨債中並十惡之罪消滅矣怨債經文法師諷演施主所造多生十般怨債業造罪無有期生生與世世解冤何日了今對三寶前求哀懺悔十般冤業罪消滅信禮觀世音菩薩吟偈凡夫三業不清涼歷劫塵埋在苦鄉自作教他何覺悟故為誤犯少籌量了知本性元無性頓悟身光自有光今日懺除何所喻琉璃瓶內佇朝陽梵語心經觀音懺罪咒觀音感驗儀宣演提綱觀音靈應最多雖累日言之亦恐未盡今且略陳一二道場僧俗各請虔誠諦聽按寶王經云寶手菩薩白佛言世尊觀自在菩薩有何福德而能變現是神力佛言如四大洲於其一年十二月中於晝夜分常降大雨我能數其一一滴數觀自在菩薩所有福德而我不能說盡數量又如大海深廣八萬四千踰繕那如是四大海水我能數其一一滴數觀自在菩薩所有福德而我不能說盡數量善男子非獨此界唯我一身乃至他方無數如來俱集一處亦不能說盡觀自在菩薩福德數量又佛告無盡意菩薩若有人受持六十二億恒河沙菩薩名字復畫形供養飲食衣服臥具醫藥於汝意云何是善男子善女人功德多不無盡意言甚多世尊佛言若復有人受持觀世音菩薩名號乃至一時禮拜供養是二人福正等無異於百千萬億劫不可窮盡無盡意受持觀世音菩薩名號得如是無量無邊福德之利今且略陳一二道場僧俗各請虔誠諦聽菩薩消災救厄之驗感驗經文法師諷演火不能燒提綱按冥祥記云沙門法智為布衣時常獨行大澤中忽遇獨火四方俱起走路已絕便志心禮誦觀世音俄而火過一澤之草無有孑遺獨法智所在之處前後不燒又按辯正論云晉有竺長舒專誦觀音經後居吳邑中遭火甍簷相繼長舒家正在下風自分燒毀一心念觀世音火欲至長舒家風回火滅有惡少年訝之至後夜風急以火投長舒家屋四投皆滅少年至明詣長舒家叩頭首過長舒云我無神力但誦觀世音菩薩此即經云設入大火火不能燒之明驗也一節經文持經諷誦波浪不能沒提綱按冥祥記云晉欒荀征盧循失利舡舫遭火賊亦交逼荀恐怖分盡但誦觀世音俄見江中一人挺立腰與水齊荀知祈念所感便投水就之脚似履地尋而大軍遺舡救接遂得免難又按廣異記云唐天寶初長沙尉成珪部送橋木始至揚州累遭風木遺失差眾揚州謂珪盜賣其木拷掠行夫不勝楚痛妄云破用揚州轉牒潭州府潭府令楊覲來取珪覲至乃械珪以連鎖鎖枷附於船梁四面釘塞珪意若至潭府必死自發揚州便至心念救苦觀世音菩薩名號經十餘日枷鎖忽然開解伺夜深出船梁背至覲所居呼曰楊覲汝如我何當葬江魚腹中豈與汝輩成功耶因決意赴水遇一木抱得隨木浮沉但志心念觀音遂得達岸尋入京師於御史臺申理既得雪遂出家此即經云若為大水所漂稱其名號即得淺處之明驗矣入經黑風吹其船舫提綱又按法苑珠林晉沙門竺法純元興中起寺買材路經湖道既入湖日暮暴風波浪如山純船小水入命在瞬息乃一心誦觀世音俄有大船流至純即乘之小船應時淪沒大船隨波鼓盪俄而達岸近歲處州毛大節嘗得成都府竹溪院僧智評所畫觀音將入海舶忽遭大黑風其前二船已摧溺人人自以為必死祈神呼鬼皆未有驗毛大郎於竹筒中出觀音展觀焚香少選之間有大月輪現於船前觀音坐其中舟眾瞻禮喜躍忘懼既而月輪漸退船隨而行回顧黑風已在三百里外矣其後託濟州劉五節附書及奇器以謝智評而劉生亦專求智評與畫觀音如海中所見之像以歸奉事此則經云波浪不能沒皆得解脫羅剎之難之明驗矣入經刀尋段段壞提綱按宣驗記吳郡人沈英被繫處死臨刑誦觀音不息刀刃自斷因而被釋又陸暉繫獄分死乃令家人造觀音像及行刑刀折三易刀皆折官問之答曰恐是觀音之力及看像項上有三刀痕乃奏獲免又准齊書說元魏天平元年定州勇士孫敬德身在防處造觀音像年滿將還在家禮事後為賊所引不堪拷楚遂妄承前業明日將刑今日禮懺流淚忽如夢中見一沙門教誦救生觀音經經有諸佛名號令誦千遍得免苦難敬德忽覺如夢所見一無差錯誦得百遍所司執縛向刑且行且誦直至臨刑誦得千遍下刀以斫刀成三段皮肉不傷復換於刀凡經三換刀折如初監司問之具陳所以以狀奏聞丞相高懽進表於東魏靜帝請免罪自此將經號為高王觀世音經敬德還家設齋迎像乃見項上有三刀痕謂舉事云高懽免難在敬德故玄贊疏云法琳歸命免七日之刑高懽憑依脫三刀之害此則經云刀尋段段壞之明驗矣一節經文法師諷演惡鬼不能加害提綱按廣異記唐王琦嘗畜淨刀子每念誦即持之及患天行疫常置刀在床頭自衛後疾甚乃立起念觀音名暗忽如晝見刀刃上有僧來問琦此何刀耶琦云是殺鬼刀僧遂滅俄而有鐵鎚從空下擊擊刀累二百餘下鎚悉破碎而刀不損其後乾元中又疫篤復至心念觀音見數百鬼乘船而至就琦求食食訖又造紙衣焚之遂安又按法苑珠林唐貞觀中杜知楷少好釋典居泰山披僧衣長誦觀音忽患垂死以袈裟覆之昏然如夢見老母及美女數十人屢來相擾知楷端然不動漸來相逼並云舉知楷擲之此澗裏遂同執知楷忽攬著袈裟皆走退齊聲念佛請為念阿彌陀如來知楷許之仍默誦觀音三十餘遍遂覺體中大汗而愈此即經云惡鬼不能加害之明驗矣入經杻械枷鎖段壞提綱按晉書符丕載記徐毅為慕容永所獲械埋其足將殺之毅誦觀世音經至夜中土開械脫於重禁之中若有人導之者遂奔楊佺期以為洛陽令又按法苑珠林宋彭子喬長誦觀音經任益陽縣主簿事太守沈文龍以罪被繫文龍必欲殺之子喬憂惶無計唯志誠誦觀世音經一日晝寢方熟有湘西人杜道榮亦繫在獄忽見雙鶴集子喬屏風上頃有一鶴下至子喬邊忽變如美人道榮諦視之則子喬雙械脫在腳外子喬亦寤共視咨嗟恐官疑其叛乃取械自著後數日果得釋此則經云杻械枷鎖皆得解脫之明驗矣入經經過險路即得解脫提綱按辯正論毛德祖初投江南偷路而過為虜騎所追乃伏路側蓬蒿中半身猶露自意必死但合掌念觀世音俄而雲起雨注追騎各退遂至江南又按冥祥記秦畢覧隨慕容垂北征沒於虜單騎逃歸虜追騎將逐覧至心誦觀世音虜騎無故自回既得免乃入山中迷惑失道至心誦念中夜見一道人法衣持錫示以途徑乃得至家此即經云經過險路即得解脫之明驗矣入經求男生男提綱按辯正論云晉王珉無子嘗祈觀音後路行逢一胡僧云我死為君作子少時道人亡而珉妻有孕及生能語即通西域十六國梵音聰慧非常即尚書王洪明也故小名阿練若又按冥祥記云宋卞悅之年五十無子發願誦觀音經千遍其數垂畢而妻有娠生一男此即經云求男生男之明驗矣入經惡獸即走提綱按法苑珠林云宋元嘉中沙門曇無竭誦觀音經淨修苦行與其徒二十五人往尋佛國既達天竺舍衛路逢山象成群無竭稱觀音名誦觀音經忽有獅子從林中出群象驚奔後有群野牛鳴吼而來無竭又稱誦如初忽有大鷲飛來野牛奔散此即經云若惡獸圍繞利牙爪可怖念彼觀音力疾走無邊方之明驗矣吟偈觀音垂願化娑婆接引眾生出愛河靈驗昭彰難可述神通變化孰能過自知悟道方成佛益已安禪便利他念念念成無相念分明具足六波羅一節經文法師諷演觀音一字真言至心中心真言歌讚觀音化現儀當演提綱道場眾等既已聞觀音之神驗今當述觀音化現之迹按法華經普門品及楞嚴經云皆有菩薩遊娑婆世界化現說法之形又華嚴經云常於一切諸佛所住隨所應化普現其前或顯現妙身現變化身現同類身又六字章句經云若善男子善女人四部弟子得聞觀世音名號並受持讀誦六字章句若行曠野迷失道徑誦此咒故觀音菩薩大悲薰心化為人像示其道路設復有人遇大禍對亡失國土妻子財產與怨憎會稱觀世音菩薩名號誦念此咒數息繫念無分散意經七七日時大悲者化為天像及作大力鬼王像接還本土令得安穩爾時世尊而說偈曰大悲大名稱吉祥安樂人常說吉祥句濟度極苦者眾生若聞名離苦得解脫亦遊戲地獄大悲代受苦或處畜生中化作畜生形教以大智慧令發無上心或處阿修羅軟言調伏心令除憍慢習疾至無為岸現身作餓鬼手出香色乳饑渴逼切者施食得飽滿大慈大悲心遊戲於五道常以善集會無上勝方便普救一切眾令離生死海當得安樂處到大涅槃岸以此觀之觀音大悲何所不現雖地獄畜生餓鬼修羅盡現其中上至佛身得度之人下至陝府婬婦之相以無緣慈一一化度此真所謂不可以名名之功不可以讚讚之德也觀音化現幾多身六道三途出苦輪普願超凡兼入聖盡令捨妄悉歸真隨緣在欲元無欲離相居塵不染塵定慧慈悲皆攝受新成舊佛佛成新一節經文隨心印咒至求見觀音印真言歌讚普為眾等志心懺悔我昔所造諸惡業皆由無始貪嗔癡不悟自性本來真枉入四生並六趣一念迴光而返照譬如雲散月當空不歷僧祗獲法身自利利他悉圓滿普為眾等志心發願願身口意常清淨一切罪業悉消除願我心同如意珠一切所願悉成就一一消除微細惑背塵合覺獲真常舜若多性可銷亡爍迦羅心無動轉普為眾等志心說偈三界悠悠如夢幻四生擾擾但奔馳歸依無上佛菩提便是當來堅固藏普為眾等志心回向會上因緣三世佛圓通海會佛菩薩聲聞羅漢賢聖僧摩訶般若波羅密回向止
