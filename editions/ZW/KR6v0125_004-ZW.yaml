body:
  text: 圓通三慧道場儀文中眉州著作郎成都應學教授侯溥賢良集鎖佛龕大眾志誠心同誦嘆佛偈菡萏紅蓮凝舌相蘋婆丹果豔唇端威儀相若象王行說法音同獅子吼應身觀世音菩薩嘆佛宣疏警策大眾儀當演今欲懺罪拔苦當啟請化現聖賢合道場人各請繫心一處不得妄念念念清淨念念慈悲所冀聖賢降格先當警策大眾同聲應和道場清淨眾各各當志心志心勤歸依志心勤禮拜大聖大慈悲觀世音菩薩唯有觀世音能拔眾生苦唯有觀世音能滅眾生罪凡我等愚迷令我延壽命令我所薦嚴自無始劫來深造諸黑業皆由身口意及我諸先代內外諸眷屬或已生人天而未登聖地或以業緣牽未得受快樂是故我等眾今日須控告唯願聖慈悲開受我等請令我諸罪苦無有不消滅諸罪苦滅已各發菩提心諸惡不復作眾善力奉行今日已往去永不復退轉三說信禮觀世音菩薩再伸警策禮觀音黑業消除白業深隨喜盡超三有海見聞俱出八邪林如如理悟無生理了了心通大覺心眾善奉行不退轉聖凡一體古猶今應身觀世音菩薩第二啟請一心歸命禮身垂瓔珞頂戴彌陀七寶花示菩薩之冠容千輻輪乃如來之足相碧玉螺紋旋宛轉紫金蓮掌劃分明手中一目妙圓光胸藏卍字莊嚴印神通莫測變化多方是以或慈或威俱為救物或定或慧悉以導人在普門品則化一十九身於楞嚴經則垂三十二應有求皆答無願不從皆由願力之洪深悉致仁功之普愽願垂哀憫俯察凡庸今日今時光臨法會受請供養證圓通觀世音菩薩啟請今當第二回五輪投地業山摧心心洗懺千生罪念念消除萬劫災返本還源求解脫背塵合覺免輪迴凝然珍重將伸禮須仗真言震法雷禮拜真言召請真言禮請上聖儀當演禮拜能除我慢障禮拜能除我慢愆禮拜能感尊貴身禮拜能生三善道誠心仰請遍法界中化現佛身觀世音菩薩獨覺身觀世音菩薩緣覺身觀世音菩薩聲聞身觀世音菩薩梵王身觀世音菩薩帝釋身觀世音菩薩自在天身觀世音菩薩大自在天身觀世音菩薩伏願六通鑑照俯降道場副我願心拔苦懺罪誠心仰請遍法界中那羅延天身觀世音菩薩天大將軍身觀世音菩薩四天王身觀世音菩薩四天王國太子身觀世音菩薩日天子身觀世音菩薩月天子身觀世音菩薩火天子身觀世音菩薩水天子身觀世音菩薩風天子身觀世音菩薩伏願六通鑑照俯降道場副我願心拔苦懺罪誠心仰請遍法界中人王身觀世音菩薩長者身觀世音菩薩居士身觀世音菩薩宰官身觀世音菩薩婆羅門身觀世音菩薩化現比丘身觀世音菩薩化現比丘尼身觀世音菩薩化現優婆塞身觀世音菩薩伏願六通鑑照俯降道場副我願心拔苦懺罪誠心仰請遍法界中化現優婆夷身觀世音菩薩化現女主身觀世音菩薩及國夫人命婦大家身觀世音菩薩化現父母身觀世音菩薩化現童男童女身觀世音菩薩化現天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽等身觀世音菩薩化現人非人等有形無形有想無想身觀世音菩薩化現執金剛身觀世音菩薩化現深妙神身觀世音菩薩化現穢跡明王身觀世音菩薩伏願六通鑑照俯降道場副我願心拔苦懺罪誠心仰請遍法界中化現揭帝明王身觀世音菩薩伏願六通鑑照俯降道場副我願心拔苦懺罪上來禮請圓通會上第二時中應身觀世音菩薩摩訶薩眾已沐雲臨光降道場證盟功德伏願天眼遙見慧耳遙聞他心遙知神通遙見以大悲力起無緣慈憐愍有情哀受我請慈悲護念降臨道場證盟此齋充遍法界願此善力廣大無邊猶若虛空具諸功德奉請已一心歸命禮常住三寶迎三大士再加禮請聖觀音上來所請觀音化身已沐降臨已得拔苦懺罪今按請觀音消災毒害陀羅尼經云毘舍離國一切人民遇大惡病有一長者名曰月蓋與其同類五百長者俱詣佛所頭面作禮白佛求救佛告長者西方有佛名無量壽彼有菩薩名觀世音及大勢至汝當向彼作禮繫念數息念念不散請彼佛及二菩薩說是語時於佛光中得見西方無量壽佛並二菩薩以如來神力佛及菩薩俱到此國爾時毘舍離人即其楊枝淨水授與觀音觀音憐愍普救一切眾生而作是言汝等今日應當一心稱念禮三大士丈六金身現碧空蓮池海會紫霞紅自從西域垂明教輟起恒河化日中南無安養國極樂界長春世界無量壽尊佛運動法器出壇迎聖將當恭詣就於某處迎請無量壽佛以作證盟清眾勿勞隨音接和舉偈長春世界無量壽佛上香西方境界極樂寶成七重行樹嘆佛宣疏十方三世佛阿彌陀第一九品度眾生威德無窮盡堂堂德上來文疏宣讀已周仰對聖慈希垂朗鑒南無佛南無法南無僧南無無量壽尊佛大悲大名稱救護苦厄者大眾五體投地默念西方無量壽佛二十一遍息心作觀聞磬聲而禮聞彈指而起淨方極樂莊嚴最上寶樓閣卷舒無量七重行樹七寶臺上懸珠網光明殿上演真經香花供養聞仙奏樂金鐘響喨車璖樹下九蓮開放一枝花內一花生齊合掌一心瞻禮壽尊佛端嚴妙像無量壽佛無量壽佛長春世界大慈悲無量壽佛上來迎請無量壽佛已沐雲臨運動法器歸壇安座阿彌陀佛色光輝白毫宛轉五須彌頂上旋螺青絲髮三十二種相巍峩南無安養國極樂界長春世界無量壽尊佛諷無量壽咒真身觀世音菩薩二伸迎請香偈隨便圓通境界南海波心香烟繚繞嘆佛宣疏三慧圓通境香山紫竹林端座南海岸禮請觀世音堂上來文疏宣讀已周仰對聖慈希垂朗鑒南無佛南無法南無僧南無觀世音菩薩摩訶薩大悲大名稱救護苦厄者大眾五體投地默念觀世音菩薩二十一遍息心作觀聞磬聲而禮聞彈指而起觀音大士悲心願海補陀山上端嚴自在首楞嚴經說誰能賽他心道眼以聰明聽聞無礙若遇厄難或逢災害纔稱念便蒙輕快消除八難滅三災離纏蓋願生生世世一心頂戴觀音菩薩觀音菩薩尋聲救苦大慈悲觀音菩薩上來迎請觀音菩薩已沐雲臨運動法器歸壇安座圓通何處不圓通那箇圓通在海東三拜起來開豁眼一枝楊柳笑春風南無普陀山南海岸正法諷如意輪咒南無佛陀耶應身觀世音菩薩三伸迎請舉香偈七珍世界八寶所成嘆佛宣疏身色如金山端嚴甚微妙如淨琉璃中內現真金色上來文疏宣讀已周仰對聖慈希重朗鑒南無佛南無法南無僧南無大勢至菩薩摩訶薩大悲大名稱救護苦厄者大眾五體投地默念勢至菩薩二十一遍息心作觀聞磬聲而禮聞彈指而起歸依勢至功超十地修六度三檀等施上求佛果已證三摩地燄摩羅界運神通功能勝利向三界外隨機應契說真空廣談妙義願垂接引登上品蓮臺內毫光照處覩如來親蒙授記勢至菩薩勢至菩薩觀音良友大慈悲勢至菩薩上來迎請勢至菩薩已沐雲臨運動法器歸壇安座分明勢至露堂堂昔日曾修日月光不離彌陀常左右手持如意異奇香南無七珍山八寶界攝念佛人諷聰明神咒化身觀世音菩薩願救我苦厄大悲覆一切普放淨光明滅除癡暗冥為免殺害苦煩惱及眾病必來至我所施我大安樂我今稽首禮聞名救厄者我今自歸依世間慈悲父唯願必定來免我三毒苦施我今世樂及與大涅槃三說信禮觀世音菩薩三回伏地轉懃翹觀想觀音路匪遙再禱再祈災網斷一心一意障雲消隨聲發響洪鐘叩說法當機大海潮菩薩慈悲來赴感種瓜不是豆生苗觀音救護眾生真言破業障咒沒溺四生拘溷濁循環五道恣纏綿若非慈悲聖觀音孰與垂哀為救護多姪他嗚呼膩模呼膩閆波膩躭波膩安茶詈般茶詈首埤帝般般茶茶囉囉婆私膩多姪他伊梨寐梨鞮首梨迦婆梨佉提端耆旃陀利摩蹬耆勒叉勒叉薩婆薩埵薩婆婆耶埤娑訶多茶他伽帝伽帝膩伽帝修留毘修留毘勒叉勒叉薩婆薩埵薩婆婆耶埤娑訶觀音破惡業障消伏毒害真言南無佛陀南無達麼南無僧伽南無觀世音菩提薩埵摩訶薩埵大慈大悲唯願愍我救護苦惱亦救一切怖畏眾生令得大獲多姪多陀呼膩模呼膩閆婆膩躭婆膩阿婆熙模呼膩分茶利般茶利輸鞞帝般茶囉婆私膩休樓休樓樓兜樓樓安茶利般茶梨樓樓周周膩槃茶利富富豆豆般茶羅婆私膩矧墀躒墀膩躒墀薩婆阿婆耶羯多薩婆怛婆娑陀伽阿婆耶卑離陀閉殿娑婆訶信禮海會佛菩薩此咒名為甘露藥能救一切諸有情無量眾苦悉消除是故名為施無畏施無畏觀世音菩薩回向無上佛菩提第二時陞座字母歌讚南無大佛頂首楞嚴經吟偈比丘敘救拔罪苦儀當演提綱今此道場雖垢濁下方然上憑法力即為清淨且觀音大士所在降臨苟能志誠無求不應經云善應諸方所又云無剎不現身道場眾等各各志誠所冀菩薩降臨得滿心願拔苦懺罪法事分為七節警策大眾啟請上聖再加禮拜拔苦懺罪懺十惡罪觀音感驗觀音化現且第四拔苦懺罪者按普門品云佛告無盡意菩薩若有百千萬億眾生受諸苦惱聞是觀世音菩薩一心稱名觀世音菩薩即時觀其音聲皆得解脫又云是故此娑婆世界皆號之為施無畏者今按華嚴經入法界品云爾時善財詣觀音所頭面禮足繞無數匝恭敬合掌於一面住白言大聖我已先發阿耨多羅三藐三菩提心而未知菩薩云何學菩薩行修菩薩道我聞聖者善能誘誨惟願為我宣說答云善哉善哉善男子乃能發阿耨多羅三藐三菩提心善男子我已成就大悲法門光明之行教化成就一切眾生常於一切諸佛所住隨所應化普現其前或以慧施攝取眾生乃至同事攝取眾生顯現妙身不思議色攝取眾生放大光明除滅眾生諸煩惱熱出微妙音而化度之威儀說法神力自在方便覺悟顯現變身現同類身乃至同上攝取眾生善男子我行大悲法門光明行時發弘誓願名曰攝取一切眾生欲令一切眾生離險道恐怖熱惱恐怖愚癡恐怖繫縛恐怖煞害恐怖貧窮恐怖諍訟恐怖大眾恐怖生死恐怖惡道恐怖諸趣恐怖不同意恐怖愛不愛恐怖一切惡恐怖逼迫身恐怖逼迫心恐怖憂愁恐怖此等恐怖即觀音大士自言施無畏之事也又按羂索經護摩增益品云不空王護摩三昧耶能成就一切功德善根能滅過現一切罪障能破一切設覩嚕等能除一切惡毘那夜迦能止一切惡納瑟吒能滅一切不吉祥相能禳十六大地獄苦能除八大怖畏之事能滅一切怨諍讐難能伏他軍一切兵杖能除一切疫病飢饉能證一切諸佛大智能入一切諸佛菩提此亦施無畏之事也故法華經贊疏云作不請友為應病醫名觀自在今既懺悔所有罪業必獲消除既消除已不敢復作何則人之黑業蓋有二端因此二端遂入三途八難六道輪迴所謂二端者一是定熟業是故思業若作若增長業是也二是不定熟業謂故思業也作而不增長業也當其未入佛法名決定業若入佛法名不定業若無追悔不修對洽當可受果名增長業若追悔等名不增長業凡業有四種一者順見業作善作業見身受報非行支攝如琉瓈大王為誅瞿曇族姓善星比丘妄說一切法空生身陷入阿鼻地獄此名極惡無中有也又如法照和尚念阿彌陀佛生身往生淨土見佛此名極善無中有也二者順生業此生作善作惡來生受報三者順後業今生作善作惡隔生方受如人負債強者先牽善輕惡重則先受惡報惡輕善重則先受善報四者順不定業此生作善作惡或三五百生方受此四種業若入三乘見道者為不定受未入三乘見道者為決定受然而故思造業有五種一者他所教勅二者他所勸請三者無所了知四者根本執著謂三毒蔽心猛利執著所起諸業五者顛倒分別謂勝先罪所行惡業法句經云非空非海中非入巖穴間無有地方所脫