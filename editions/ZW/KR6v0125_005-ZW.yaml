body:
  text: 圓通三慧道場儀文下眉州著作郎成都府教授侯溥集舉佛龕圓通海會佛菩薩大眾志誠心同誦嘆佛偈胸藏黃金題卍字足輪碧玉間千花三十二相遍莊嚴千百億身常救苦化身觀世音菩薩嘆佛宣疏回壇警策大眾今當第三時中禮請上聖初當警策大眾志誠各須應和道場清淨眾各各當志心至心勤歸依至心勤禮拜大聖大慈悲觀世音菩薩唯有觀世音開示我修道唯有觀世音速令我修真自悟性本空圓明同太虛不垢忘不淨不生亦不滅是故我等眾今日須控告唯願聖慈悲開受我等請令我所追薦精修大乘行直截至佛地普濟諸有情今日已往去永不復退轉三說信禮觀世音菩薩三回警策證圓通心識圓明意氣雄有作因緣俱是幻無為行業等虛空傍生餓鬼如來用地獄天堂善逝功直截根源歸佛地人人盡識主人翁舉觀世音菩薩啟請上聖一心歸命禮智融無相恩濟有情曾事觀音如來嘗為正法明佛以廣大願發菩提心侍千億佛則無數劫來登三摩地則從聞中入上則以慈力而合十方諸佛下則以悲仰而同六道眾生或述不空羂索經或談無礙大悲咒印蘇食則受日藏聰明之法獻寶珠則拔龍女苦毒之災演如意於迦栗斯仙發護願於水精菩薩光奮摩尼之真焰吼為獅子之妙音天雨寶花繽紛宮殿六種震動蓋大士有緣於娑婆世界欲令眾生皆證於無上佛乘導我所未明開我所未悟願垂哀愍俯鑒凡庸今日今時來臨法會和受請供養證圓通觀世音菩薩菩薩隨緣化有情四生能化百千形春來處處花盈谷秋到家家月滿庭省覺到頭俱是幻悟迷畢究了無因圓融行布皆無礙收拾歸來在一塵加持禮拜真言至勸請菩薩真言信禮海會佛菩薩誠心仰請觀音化身妙覺大師菩薩伏願六通鑒照俯降道場副我願心修道證真誠心仰請觀音化身明覺大師菩薩伏願六通鑒照俯降道場副我願心修道證真誠心仰請觀音化身菩提達麼祖師菩薩伏願六通鑒照俯降道場副我願心修道證真誠心仰請觀音化身妙圓通悟法濟禪師菩薩伏願六通鑒照俯降道場副我願心修道證真上來禮請四大聖人已沐雲臨光降道場證盟功德伏願天眼遙見慧耳遙聞他心遙知神通遙見以大悲力起無緣慈憐愍有情哀受我請慈悲護念降臨道場證盟此齋充遍法界願此善力廣大無邊猶若虛空具諸功德奉請已一心歸命禮常住三寶化身觀世音菩薩敘啟祝真靈儀當演大佛頂首楞嚴經按誌公傳云有陳御虜者舉家事誌公甚篤嘗為現真形光明如菩薩像故當時皆謂誌公是觀音化身又達麼傳云達麼見梁武帝不契潛回江北帝問誌公曰彼何人誌公曰彼觀音化身又僧伽傳云伽常臥賀跋氏家現十一面觀音形舉家忻慶捨宅為寺近世無為山通悟禪師按十生記亦是觀音所化感通亦說是觀音化身嘗與大勢至菩薩同生上來啟請四大聖人伏願慈悲加護啟導愚蒙爰及有情同登正覺上食供養吟偈觀音菩薩運慈悲妙覺隨緣顯相形趙璧連城三大棄眾生是佛幾人知梁皇不契西來意達麼潛回北魏時明覺覺來無所覺有為同悟悟無為加持獻菩薩飲食真言舉四大聖人臨法會上來召請天曹地府水府一切聖賢已沐降臨今以菲食供養伏乞開恩納受願此飲食上憑觀音大聖法力遍及一切地獄餓鬼畜生孤魂魍魎咸得霑受無有饑渴施鬼神食真言至施甘露咒不空摩尼供養真言信禮觀世音菩薩回向無上佛菩提四聲第三時陞座三寶字母歌讚南無大佛頂首楞嚴經吟偈比丘眾等解脫修心稽首難思真法界圓通海會眾聖賢我今陞座演鴻儀惟願慈悲垂加護今此第三時中修道證真法事分為十節警策大眾啟請上聖啟祝真靈解脫修心六波羅蜜修行地位七災起義從聞思修表懺宣疏禮別設散且解脫修心此第三時伏願解脫修心修道證真然而道本無修因修而後至真安可證須證而乃知事出漸修理從頓悟故首楞嚴三昧經云佛告諸天龍神汝以是故當於十二見縛而得解脫何等十二我見縛眾生見縛壽命見縛人見縛斷見縛常見縛我作見縛我所見縛有見縛無見縛此彼見縛諸法見縛是為十二合道場人若能解脫十二見縛得是大安樂法門又按大悲心經云大梵天王合掌恭敬白觀世音菩薩言惟願大士為我說此陀羅尼形貌相狀菩薩答言陀羅尼相貌者大慈悲心是平等心是無為心是無染著心是空觀心是恭敬心是卑下心是無雜亂心是無惱害心是無見取心是無上菩提心是當知是等心是陀羅尼相貌人能依此修心必成正覺解脫修心道可攀證真如理出塵寰昔年未悟金藏鑛今日方知玉在山般若智明登彼岸菩提心發遍人間陀羅尼藏誰能識識得元來不等閑入經種族奮怒王真言至淨戒波羅蜜咒歌讚六波羅密儀當演上來所陳十二見縛十二相貌皆以修道證真然而須以六波羅密為本今當敷述各請虔誠諦聽按解深密經云觀自在菩薩復白佛言世尊是諸菩薩凡有幾種所應學事佛告觀自在菩薩言善男子菩薩學事略有六種所謂布施持戒忍辱精進禪定智慧到彼岸觀自在菩薩復白佛言何因緣故設如是所應學事但有六數佛告觀自在菩薩曰善男子有二因緣故一者饒益諸有情故二者對治諸煩惱故當知前三饒益諸有情後三對治一切煩惱前三饒益有情者謂菩薩由布施故攝受資具饒益有情由持戒故不行損害逼迫惱亂饒益有情由忍辱故於彼損害逼迫惱亂堪能忍受饒益有情後三對治諸煩惱者謂諸菩薩由精進故雖未永伏一切煩惱亦未永害一切隨眠而能勇猛修眾善品破諸煩惱不能傾動善品加行由靜慮故永伏煩惱由般若故永害隨眠觀自在菩薩復白佛言世尊如是六種波羅密多各有幾種品類差別佛告觀自在菩薩曰善男子各有三種施三種者一者法施二者財施三者無畏施戒三種者一者轉捨不善戒二者轉生善戒三者轉生饒益有情戒忍三種者一者耐怨害忍二者安受苦忍三者諦察法忍精進三種者一者被甲精進二者轉生善法加行精進三者饒益有情加行精進靜慮三種者一者無分別寂靜極寂靜無罪故對治煩惱眾苦樂住靜慮二者引發功德靜慮三者饒益有情靜慮慧三種者一者緣世俗諦慧二者緣勝義諦慧三者緣饒益有情慧六波羅蜜遍熏修便得超凡入聖流萬行圓融天地闊三輪清淨鬼神愁岩前已絕啣花鳥石畔長閑獻果猴今古堂堂觀自在何須馳騁四方求入經安忍波羅密咒至精進波羅密咒歌讚修行地位儀當演上來所陳六波羅蜜是修道之本原在修行中寔有地位今述頓悟漸修次序合道場人各當諦聽按唐慧忠國師注心經觀自在菩薩云此破凡夫歷劫背心唯觀諸法被法所拘不得自在大意衹令眾生背境觀心悟心無法可得何以故且如色法因心而起反觀起心無有處所實不可得心尚自無色從何有猶如幻人不念不著此人於色法中定得自在乃至一切法不可得不被一切法所攝一切處得自在如是之人悟心無心了境無境心境兩忘無了可了坦然無礙故名自在菩之言了薩之言見了見諸法本來空寂故名菩薩今道場人有能了見諸法本空即心即佛即是觀自在菩薩此為頓悟何名漸修漸悟耶答漸修漸悟者即菩薩十地各各不同階降漸修斷十重障證十真如名為漸悟按解深密經十地波羅密多品云爾時觀自在菩薩白佛言世尊如佛所說菩薩十地所謂極喜地離垢地發光地焰慧地極難勝地現前地遠行地不動地善慧地法雲地復說佛地為十一地觀自在菩薩復白佛言世尊何緣最初名極喜地乃至何緣說名佛地佛告觀自在菩薩曰善男子成就大義得出世間心生大歡喜是故最初名極喜地遠離一切微細犯戒是故第二名離垢地由彼所得三摩地及聞持陀羅尼能為無量智光依止是故第三名發光地由彼所得菩提分法燒諸煩惱智如火焰是故第四名焰慧地由即於彼菩提分法方便修習最極艱難方得自在是故第五名極難勝地現前觀察諸行流轉又於無相多修作意方現在前是故第六名現前地能遠證入無缺無間無相作意與清淨地共相隣接是故第七名遠行地國由於無相得無功用於諸相中不為現行煩惱所動是故第八名不動地於一切種說法自在獲得無量廣大智慧是故第九名善慧地麄重之身廣如虛空法身圓滿譬如大雲皆能遍覆是故第十名法雲地永斷最極微細煩惱及所知障無著無礙於一切種所知境界現正等覺是故第十一地名佛地然則理無淺深證無階降以無為法聖賢不同或階位歷然或無所位次故華嚴之旨行布不礙圓融圓融不礙行布行布則教相施設圓融乃理性德用相是即性之相故行布不礙圓融性是即相之性故圓融不礙行布由圓融不礙行布則一為無量由行布不礙圓融則無量為一無量為一則圓融隱隱一為無量則涉入重重惟智乃知情解莫測是即為人由己不假他人但信自心勿生疑滯今且先陳普門品七災起義云使人人皆知動靜語默皆是自心迷則業緣悟則佛性修行地位強區分悟則元來本一門背境觀心心已寂悟心無境境何存月沉巨海真無玷雲散長空豈有痕一則為多多即一五般香爇遍乾坤入經靜慮波羅蜜至般若波羅蜜真言歌讚七災起義儀當演凡言七災起義以權言之則其靈應如前第二時中所說若於理上起法即不必水火黑風之實狀何則無名瞋心燒毀善根便是大火論語云一朝之忿亡其身以及其親豈非惑歟此則無明之發過於大火且人之忿怒身面赤熱即亦火相能於此時心念觀音忽然省覺便是火不能燒所謂大水所漂者貪愛日作不自覺知如水之性轉流轉下輪迴三界世世漂沉能於此時心念觀音忽然省覺上智之人貪嗔立除即是波浪不能沒中人已下漸得除去便是即得淺處所謂百千萬億眾生為求寶入海黑風吹其船舫飄墮羅剎鬼國者黑風者亦是無明迷闇按簡正鈔云三界虛妄所感名為羅剎鬼國又傳燈錄云于頔相公問紫玉山道通禪師如何是黑風吹其船舫漂墮羅剎鬼國師云于頔客作漢問恁麼事作麼于公失色師乃指云這箇便是漂墮羅剎鬼國所謂臨當被害稱觀世音菩薩名者彼所執刀杖尋段段壞者按簡正鈔云慢疑二種臨欲生起損傷慧命外緣菩薩內發善心慢疑作用漸漸微劣及至解脫今謂慢疑二種於理信然然而一切可以損壞清淨佛性者皆得為害故以比之刀杖蓋刀杖者害人之具也人能稱念觀音忽然省覺則害人之具悉皆消滅矣所謂三千大千國土者我身是也滿中夜叉羅剎者人之妄心是也處處執故故曰滿中能於此時心念觀音忽然省覺妄心不起即是惡鬼不能以惡眼視之況復加害所謂設復有人若有罪若無罪者按簡正鈔云三惡業趣是不善性違理損物名為有罪人天二趣善性行支名為無罪俱能繫縛在三界獄如杻械等若能稱念觀音忽然省覺自然清淨何由杻械故曰皆悉段壞所謂有一商主者按簡正鈔云商主喻心王商人喻心所重寶喻無漏因求出三界名經過險路其中一人作是唱言者謂悲心忽起也由此言之今此會中有能悟此修道證真在一剎那一剎那者時之極少也凡一彈指有六十五剎那若未證真但常心念心念不已自然頓悟今日今時最為要切眾生迷到入邪林妄念攀緣水火侵有我有人煩惱宅非真非妄涅槃心執情難悟塵埋鏡離相方知鑛出金實狀元來無一物迷雲散盡見觀音入經蓮花大心真言至心中心真言歌讚從聞思修儀當演今按觀音圓通以耳聞圓照三昧為第一故文殊師利法王子說偈云隔垣聽音響遐邇俱可聞五根所不齊是則通真實音聲性動靜聞中為有無無聲號無聞非實聞無性聲無既無滅聲有亦非生生滅二圓離是則常真實昔杜鴻漸召無住禪師至成都庭木上鴉鳴杜公問師聞否師曰聞鴉去又問師聞否師曰聞公曰鴉去無聲云何言聞師乃普告大眾佛世難值正法難聞各各諦聽聞無有聞非關聞性本來不生何曾有滅有聲之時是聲塵自生無聲之時是聲塵自滅而此聞性不隨聲生不隨聲滅悟此聞性則免聲塵之所轉當知聞無生滅聞無去來此無住之言即文殊大士之意也又按本淨禪師偈云見聞覺知無障礙色香味觸常三昧如鳥空中衹麼飛無取無捨無憎愛若能當處常湛然始得名為觀自在又雲居和尚頌云子欲識觀音猿啼暖谷深嫩林鶯語細槁木晚螳吟悲極誠難入慈全不易尋聲聲諸國土一一即君心又趙大資嘗作圓通頌云凡夫具足法迷悟隨六識一入自在門不費纖毫力又云世間何為苦眾生有業識聞名悉解脫方便神通力運使俞學士作觀音二讚其一云若觀觀世音即非觀世音若了觀世音是真觀世音其二云觀音入一根歸源六根靜微妙解脫門長安無別徑合道場人於此時中向此悟入便得觀音圓通三昧即是開設道場本意便證阿耨多羅三藐三菩提心故楞嚴經云事非頓除因次第盡理則頓悟乘悟併銷念念增進隨所發行安立聖位成等正覺慎勿妄心一起黑業所牽隨處輪迴追悔無及聞思修慧證何難月照千江逗影寒岌岌青山忘嶮峻滔滔綠水絕波瀾泥牛走退三千里石女嘲歌百萬般覿面相逢何所似鶑啼燕語作家看入經吉祥蓮花心中心真言歌讚三時表懺法事舉秘密主菩薩摩訶薩四聲表懺儀文當宣演提綱三時法事已云週聖志隨心廣願求六七真言多感驗通身手眼更無修施主志誠聽聞表懺入儀按執金剛秘密主菩薩以偈讚嘆觀世音菩薩云嗚呼大悲觀世音嗚呼世間自在王若有專正憶持者得脫一切惡道苦此是世間尊重父此是世間尊重母此是世間救度者此是世間大日光吟偈表懺須誠願已完聽宣大士妙真言凡夫心發精虔意聖智哀求廣大恩游詠每從諸有海經行常在涅槃門願知所願皆如意事事圓通悟本源觀音菩薩威神之力巍巍如是今當表懺啟請加持一一為施主宣揚密語人間所願人人別菩薩隨機說密言香壇一一為宣揚所冀願心俱滿足施主若欲成就廣大智慧請誦寶鏡手真言施主若欲成就口業詞辯音聲巧妙者請誦寶印手真言施主若欲成就聰明多聞強記憶持不忘者請誦寶經手真言施主若欲呼召一切諸天善神者請誦寶螺手真言施主若欲求仕宦榮官益職者請誦寶弓手真言施主若欲公私清吉一切時一切處離官難者請誦鉞斧手真言施主若欲良朋善友早相遇者請誦寶箭手真言施主若欲求一切善和眷屬者請誦寶瓶手真言施主若欲求男女及諸仆使者請誦玉環手真言施主若欲成就富饒種種珍寶資具者請誦如意寶珠手真言施主若欲成就花果稼穡無不豐稔者請誦蒲桃手真言施主若欲成就求地中種種伏藏者請誦寶篋手真言施主若欲成就治氣養生求諸仙道速成就者請誦五色雲手真言施主若欲成就降伏一切魍魎鬼神者請誦寶劍手真言施主若欲成就降伏一切天魔外道者請誦跋折羅手真言施主若欲成就令一切鬼神龍蛇虎狼獅子人及非人常相恭敬愛念者請誦合掌手真言施主若欲成就令使一切鬼神不相違拒者請誦髑髏手真言施主若欲成就摧伏一切怨敵者請誦金剛杵手真言施主若欲成就為一切饑渴有情及諸餓鬼得清涼者請誦甘露手真言施主若欲成就辟除他方逆賊怨敵者請誦寶戟手真言施主若欲成就辟除一切虎狼諸惡獸者請誦牓牌手真言施主若欲成就除一切惡障難者請誦白拂手真言施主若欲成就除一切怖畏不安者請誦無畏手真言施主若欲成就除腹中諸病苦者請誦寶鉢手真言施主若欲成就治眼闇無光明者請誦日精摩尼手真言施主若欲成就除熱毒病求清涼者請誦月精摩尼手真言施主若欲成就除身上種種病者請誦楊枝手真言施主若欲成就治種種不安穩者請誦羂索手真言施主若欲成就一切上妙梵音聲者請誦寶鐸手真言施主若欲成就上代先亡生諸梵天者請誦軍持手真言施主若欲成就先亡遠祖一切眷屬生西方淨土者請誦青蓮花手真言施主若欲成就內外宗親先亡遠祖生諸天宮者請誦紅蓮花手真言施主若欲成就面見一切十方諸佛者請誦紫蓮花手真言施主若欲成就種種功德者請誦白蓮花手真言施主若欲成就十方諸佛速來摩頂授記者請誦頂上化佛手真言施主若欲成就十方諸佛速來授記者請誦數珠手真言施主若欲成就善神龍王常來擁護者請誦鋸尸鐵鈎手真言施主若欲成就生生之處不離諸佛邊者請誦化佛手真言施主若欲成就生生世世常在佛宮殿中不處胎臟受身者請誦化宮殿手真言施主若欲成就從今身至佛身菩提心常不退轉者請誦不退金輪手真言施主若欲成就慈悲覆護一切眾生者請誦錫杖手真言凡施主所行所為所願所求上來真言所不能該說者伏願聖慈並令成就請誦觀音隨所作事成就真言歌讚菩薩悲深智慧巧妙聰明仕宦良朋富饒男稼穡珍寶豐盈仙道鬼神魔類逢冤敵仰叩觀音有情者惡障怖畏病苦永消沉光明清涼者補陀大士仰望垂恩內外先亡遠祖諸佛賜功德緣因處處善神擁護不受胎早獲圓通慈悲父眾生瞻仰亘古至今生信禮觀世音菩薩普懺罪菩薩摩訶薩四聲普為眾等志心懺悔稽首圓通大覺海圓澄妙海眾聖賢各垂方便證菩提登三摩地無差別頗恨多生顛倒想迷真妄起逐根塵境風浩浩鼓靈源識浪滔滔翻性海所以想成塵國土由茲知覺乃眾生聖凡迷悟各差殊捨父迷頭爭自返衣內元來曾不識宅中伏